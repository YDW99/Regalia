name: 功能请求
 description: 为 Regalia 提出新功能或改进建议
 title: "[Feature] "
 labels: ["enhancement", "triage"]
 body:
   - type: markdown
     attributes:
       value: |
         感谢您为 Regalia 出谋划策！
         
         在提交之前，请确认：
         - [ ] 我已经搜索过现有 Issue，确认该功能未被提出过
         - [ ] 我已经查看过 [Releases](https://github.com/YDW99/Regalia/releases) 和 [Roadmap](https://github.com/YDW99/Regalia/issues?q=is%3Aissue+label%3Aroadmap)，确认该功能不在计划中
 
   - type: textarea
     id: description
     attributes:
       label: 功能描述
       description: 用简洁清晰的语言描述您想要的功能
       placeholder: |
         例如：希望添加「棋局云同步」功能，允许用户登录后将棋局数据同步到云端，
         以便在多台设备间保持对弈记录和设置的一致性。
     validations:
       required: true
 
   - type: textarea
     id: problem
     attributes:
       label: 解决的问题
       description: 这个功能将解决什么问题？如果不添加，用户会遇到什么不便？
       placeholder: |
         目前用户更换设备时需要手动导出/导入 PGN 文件来迁移棋局记录，
         对于经常在多台设备上使用的用户来说非常不便。
     validations:
       required: true
 
   - type: textarea
     id: use_cases
     attributes:
       label: 使用场景
       description: 描述该功能的具体使用场景和目标用户
       placeholder: |
         1. 用户 A 在手机和平板上都安装了 Regalia，希望在两台设备上看到相同的对弈历史
         2. 用户 B 更换了新手机，希望一键恢复所有棋局数据和个性化设置
         3. 用户 C 希望在网页端也能查看自己在 App 中下的棋
     validations:
       required: true
 
   - type: textarea
     id: proposal
     attributes:
       label: 可能的实现方案
       description: 如果您有想法，请描述可能的技术实现方案（可选）
       placeholder: |
         可以考虑使用 WebDAV 协议连接用户自己的云存储（如坚果云、Nextcloud），
         这样不需要维护后端服务器，也尊重用户隐私。
         
         或者支持导出/导入完整的设置和棋局数据库文件。
 
   - type: dropdown
     id: priority
     attributes:
       label: 优先级
       description: 您认为这个功能的重要程度
       options:
         - 🔴 高 — 缺少该功能严重影响使用体验
         - 🟡 中 — 有该功能会更好
         - 🟢 低 — 锦上添花，不急迫
     validations:
       required: true
 
   - type: dropdown
     id: scope
     attributes:
       label: 影响范围
       description: 该功能主要涉及哪个层面
       options:
         - 引擎层（Stockfish、UCI 协议相关）
         - UI 层（WebView 前端、界面交互）
         - Android 原生层（Java/Kotlin 代码）
         - 构建/发布流程
         - 文档/国际化
         - 不确定
     validations:
       required: true
 
   - type: textarea
     id: mockup
     attributes:
       label: 界面草图 / 参考
       description: |
         如果涉及界面改动，请上传草图、截图或参考应用截图。
         手绘草图也完全可以！
       placeholder: |
         将图片拖放到此处上传...
 
   - type: textarea
     id: additional
     attributes:
       label: 附加信息
       description: 任何其他补充说明
       placeholder: |
         - 该功能在其他国际象棋 App（如 Lichess、Chess.com App）中是如何实现的？
         - 是否有开源项目可以作为参考实现？
         - 您是否愿意参与该功能的开发？