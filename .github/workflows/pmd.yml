name: PMD Java Code Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pmd:
    name: PMD Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@v2
        with:
          version: "7.4.0"
          rulesets: "rulesets/java/quickstart.xml,rulesets/java/errorprone.xml,rulesets/java/bestpractices.xml"
          sourcePath: "app/src/main/java"
          analyzeModifiedFilesOnly: "${{ github.event_name == 'pull_request' }}"
          format: "sarif"
          outputFile: "pmd-report.sarif"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pmd-report.sarif
        if: always()
