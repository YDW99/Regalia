name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Greet New Contributor
        uses: actions/first-interaction@v1.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hello! 你好! Welcome to the Regalia project! 🎉

            Thank you for opening your first issue. We appreciate your feedback and will review it as soon as possible.
            感谢您提交第一个 Issue，我们会尽快查看并回复。

            To help us assist you better, please make sure you've included:
            - A clear description of the problem / feature request
            - Steps to reproduce (if reporting a bug)
            - Your device/Android version (if relevant)
            - Any relevant screenshots or logs

            Please check our [existing issues](https://github.com/${{ github.repository }}/issues) to avoid duplicates.
            请查看 [已有 Issue](https://github.com/${{ github.repository }}/issues) 以避免重复提交。

          pr-message: |
            Hello! 你好! Welcome to the Regalia project! 🎉

            Thank you for your first pull request! Your contribution means a lot to us.
            感谢您提交第一个 Pull Request，您的贡献对我们非常重要！

            Here's what happens next:
            - Our CI checks will run automatically (Gradle build, code format checks, etc.)
            - A maintainer will review your changes
            - We may suggest some improvements before merging

            Please make sure:
            - Your PR description clearly explains the changes
            - All CI checks pass
            - The code follows the project's coding style

            Thanks again for contributing to Regalia! ♟️