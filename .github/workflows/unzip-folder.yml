name: Auto Unzip Folder to Root

on:
  push:
    paths:
      - 'upload.zip'
    branches:
      - upload  # 触发分支（建议改为 main 或 master）
  workflow_dispatch:  # 支持手动触发

jobs:
  unzip_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启仓库写入权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 Git 历史

      - name: Check if upload.zip exists
        id: check_zip
        run: |
          if [ -f "upload.zip" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Found upload.zip"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ upload.zip not found"
          fi

      - name: Unzip and copy to root
        if: steps.check_zip.outputs.exists == 'true'
        run: |
          echo "📦 Unzipping upload.zip..."
          mkdir -p ./extracted
          unzip -o -q upload.zip -d ./extracted
          echo "📁 Copying files to root..."
          cp -a ./extracted/. ./
          echo "🧹 Cleaning up..."
          rm -rf ./extracted
          rm -f upload.zip

      - name: Sync with remote before pushing
        if: steps.check_zip.outputs.exists == 'true'
        run: |
          echo "🔄 Syncing with remote branch..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 暂存本地修改
          git stash push -m "temp-unzip-$(date +%s)" || true

          # 拉取远程更新（优先快进，失败则变基）
          git pull origin ${{ github.ref_name }} --ff-only || \
          git pull origin ${{ github.ref_name }} --rebase

          # 恢复暂存的修改
          git stash pop --index || true

      - name: Commit and push changes
        if: steps.check_zip.outputs.exists == 'true'
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto unzip files to root [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "✅ Changes pushed successfully"
          else
            echo "ℹ️ No changes to commit"
          fi
