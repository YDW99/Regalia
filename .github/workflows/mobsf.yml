name: MobSF Source Scan

on:
  push:
    branches: ["main"]
    paths:
      - "app/src/main/java/**"
      - "app/src/main/AndroidManifest.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "app/src/main/java/**"
      - "app/src/main/AndroidManifest.xml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobsf:
    name: MobSF Source Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mobsfscan
        run: pip install mobsfscan

      - name: Run mobsfscan
        run: |
          mobsfscan \
            app/src/main/java \
            app/src/main/AndroidManifest.xml \
            --type android \
            --sarif \
            --output mobsf-results.sarif \
            || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mobsf-results.sarif
        if: always()
