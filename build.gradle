buildscript {
// AI-GEN: AI assisted
// This code was AI-assisted and has been reviewed for AGPL v3 compliance.

    repositories {
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/central' }
        maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.7.3'
    }
}

apply plugin: 'com.android.application'

buildDir = "/tmp/regalia_build/${project.name}"

android {
    namespace 'com.Regalia'
    compileSdk 35
    buildToolsVersion "34.0.0"
    ndkVersion "27.2.12479018"

    defaultConfig {
        applicationId "com.Regalia"
        minSdk 21
        targetSdk 35
        versionCode 104
        versionName "1.0.4"

        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    signingConfigs {
        debug {
            storeFile file('../debug.keystore')
            storePassword 'android'
            keyAlias 'debug'
            keyPassword 'android'
        }
        release {
            storeFile file('../debug.keystore')
            storePassword 'android'
            keyAlias 'debug'
            keyPassword 'android'
            enableV1Signing true
            enableV2Signing true
            enableV3Signing true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
            debuggable true
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildFeatures {
        buildConfig true
    }

    // v1.0.2: Prebuilt native libraries from previous build.
    // The NDK/CMake build is skipped — we use the .so files extracted
    // from the previous APK's lib/arm64-v8a/ directory.
    // This avoids the need to download the ~663MB NDK.
    // v1.0.4 Round-5 Rev20: Re-enabled externalNativeBuild to compile engine_bridge.so
    // from source (engine_jni.cpp). The NDK is now installed at
    // /home/z/my-project/android-sdk/ndk/27.2.12479018/.
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging true
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }
}

dependencies {
}

// Force Gradle to use the JDK at /home/z/jdk-final for compilation
// (the system JRE at /usr/lib/jvm/java-21-openjdk-amd64 lacks javac)
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}
