    //   On click, selectVariationMove(varId, varMoveIdx) builds:
    //     mainline[0..mainIdxBefore-1] + variation moves[0..varMoveIdx]
    //   and re-renders stats with this synthetic sequence.
    if(movetext[i]==='('){
      let depth=1;
      let j=i+1;
      while(j<movetext.length&&depth>0){
        if(movetext[j]==='(')depth++;
        if(movetext[j]===')')depth--;
        j++;
      }
      const variationText=movetext.substring(i+1,j-1);
      // v1.0.3: Register this variation
      const varId=_variations.length;
      const mainIdxBefore=Math.max(0,_moveIdx-1);
      const varMoves=[];
      // Render variation text with piece symbol substitution
      let varRendered='';
      let vi=0;
      let varSide=nextSide; // Start from current side (will be overridden by move number prefix if present)
      // v1.0.3: If the variation does NOT start with a move number, infer the
      // side from mainIdxBefore. The variation's first move is an ALTERNATIVE
      // to mainline[mainIdxBefore] (the move to the LEFT of `(`), so it has
      // the SAME side as that move.
      // Uses moverIsWhite to handle Black-to-move-start games correctly.
      // (This inference is only applied when no move-number prefix is found
      //  in the variation text — the prefix takes precedence when present.)
      let sideInferred=moverIsWhite(mainIdxBefore,parsed)?'white':'black';
      let varSideSet=false; // becomes true once we determine the side
      while(vi<variationText.length){
        if(variationText[vi]==='{'){
          let vEnd=variationText.indexOf('}',vi);
          if(vEnd<0)vEnd=variationText.length-1;
          varRendered+='<span class="comment">{'+variationText.substring(vi+1,vEnd)+'}</span>';
          vi=vEnd+1;
          continue;
        }
        let vNumMatch=variationText.substring(vi).match(/^(\d+\.+)/);
        if(vNumMatch){
          varRendered+='<span class="move-num">'+vNumMatch[0]+'</span> ';
          // If it ends with "...", next side is Black; otherwise White
          varSide=vNumMatch[0].includes('...')?'black':'white';
          varSideSet=true;
          vi+=vNumMatch[0].length;
          continue;
        }
        let vMoveMatch=variationText.substring(vi).match(/^([KQRBN][a-h]?[1-8]?x?[a-h][1-8][+#]?=?[QRBN]?|O-O(?:-O)?|0-0(?:-0)?|[a-h]x?[a-h][1-8](?:=[QRBN])?[+#]?|[a-h][1-8][+#]?)/);
        if(vMoveMatch){
          // v1.0.3: First variation move without a preceding move number — use
          // the inferred side from mainIdxBefore.
          if(!varSideSet){
            varSide=sideInferred;
            varSideSet=true;
          }
          // v1.0.2 FIX: Don't put piece-white/piece-black on the move span —
          // renderSAN now wraps the piece symbol in its own styled span.
          // The move span keeps the default text color for the destination
          // square / capture marker / check suffix.
          // v1.0.3: Make the variation move clickable. Each variation move has
          // a unique (varId, varMoveIdx) pair; selectVariationMove uses these
          // to reconstruct the synthetic move sequence.
          // v1.0.3: When a variation move is selected, ALL variation moves from
          // index 0 up to and including the clicked index are highlighted as
          // "included" (class "var-included"), and the clicked move gets
          // "selected" on top. This visually communicates that the ENTIRE
          // series (not just the clicked move) replaces the mainline move.
          const varMoveIdx=varMoves.length;
          varMoves.push(vMoveMatch[0]);
          // Determine highlight state:
          //   - "selected": the exact move the user clicked
          //   - "var-included": moves before the clicked move in the same
          //     variation — these are ALSO part of the synthetic sequence
          const isVarSelected=_variationMeta&&_variationMeta.varId===varId&&_variationMeta.varClickedIdx===varMoveIdx;
          const isVarIncluded=_variationMeta&&_variationMeta.varId===varId&&_variationMeta.varClickedIdx>varMoveIdx;
          let moveCls='move';
          if(isVarSelected)moveCls+=' selected';
          else if(isVarIncluded)moveCls+=' var-included';
          varRendered+='<span class="'+moveCls+'" onclick="selectVariationMove('+varId+','+varMoveIdx+')">'+renderSAN(vMoveMatch[0],varSide)+'</span> ';
          varSide=varSide==='white'?'black':'white';
          vi+=vMoveMatch[0].length;
          continue;
        }
        if(variationText[vi]==='$'){
          let vj=vi+1;
          while(vj<variationText.length&&/\d/.test(variationText[vj]))vj++;
          varRendered+='<span style="color:var(--accent2)">'+variationText.substring(vi,vj)+'</span>';
          vi=vj;
          continue;
        }
        varRendered+=variationText[vi];
        vi++;
      }
      // v1.0.3: Register the variation AFTER collecting its moves.
      _variations.push({mainIdxBefore,moves:varMoves,sideAtStart:sideInferred});
      // v1.0.3: If this variation is currently selected, also mark the mainline
      // moves [0..mainIdxBefore-1] as part of the selection context (visual cue).
      result+='<span class="variation">('+varRendered+')</span>';
      i=j;
      continue;
    }
    // NAG ($1, $2, etc.)
    if(movetext[i]==='$'){
      let j=i+1;
      while(j<movetext.length&&/\d/.test(movetext[j]))j++;
      result+='<span style="color:var(--accent2)">'+movetext.substring(i,j)+'</span>';
      i=j;
      continue;
    }
    // Result markers
    if(movetext.substring(i).match(/^(1-0|0-1|1\/2-1\/2|\*)\b/)){
      let m=movetext.substring(i).match(/^(1-0|0-1|1\/2-1\/2|\*)/);
      result+='<span style="color:var(--accent);font-weight:600">'+m[0]+'</span>';
      i+=m[0].length;
      continue;
    }
    // Move number (e.g. "1.", "2...", "12.")
    let numMatch=movetext.substring(i).match(/^(\d+\.+)/);
    if(numMatch){
      result+='<span class="move-num">'+numMatch[0]+'</span> ';
      // If it ends with "...", next side is Black; otherwise White
      nextSide=numMatch[0].includes('...')?'black':'white';
      i+=numMatch[0].length;
      continue;
    }
    // Piece move
    let moveMatch=movetext.substring(i).match(/^([KQRBN][a-h]?[1-8]?x?[a-h][1-8][+#]?=?[QRBN]?|O-O(?:-O)?|0-0(?:-0)?|[a-h]x?[a-h][1-8](?:=[QRBN])?[+#]?|[a-h][1-8][+#]?)/);
    if(moveMatch){
      let renderedSAN=renderSAN(moveMatch[0],nextSide);
      // v1.0.2 FIX: Don't put piece-white/piece-black on the move span —
      // renderSAN now wraps the piece symbol in its own styled span. The move
      // span keeps the default text color for destination/capture/check text.
      result+='<span class="move'+(_moveIdx===_selectedMoveIdx?' selected':'')+'" onclick="selectMove('+_moveIdx+')">'+renderedSAN+'</span> ';
      _moveIdx++;
      nextSide=nextSide==='white'?'black':'white';
      i+=moveMatch[0].length;
      continue;
    }
    // Pass through other characters
    result+=movetext[i];
    i++;
  }
  h+=result;
  h+='</div></div></div>';
  return h;
}

// Main render
function render(){
  if(!_payload){
    document.getElementById('content').innerHTML='<div class="loading">'+T('no_data')+'</div>';
    return;
  }
  const parsed=parsePGN(_payload.pgn);
  if(!parsed){
    document.getElementById('content').innerHTML='<div class="loading">PGN parse error</div>';
    return;
  }
  // v1.0.3: Reset the _variations array before each render — it gets repopulated
  // by renderPGNText() as it walks the PGN text. Without this reset, stale
  // variation entries from a previous render would persist and break the
  // (varId, varMoveIdx) → variation lookup.
  _variations=[];
  // v1.0.3: Determine the "effective" parsed object for stats computation.
  //   - If a variation move is selected (_variationMoves != null), use that
  //     synthetic sequence. Eval data is mainline-only, so it's null'd out
  //     to avoid misalignment.
  //   - Otherwise, if a mainline move is selected, slice parsed.moves up to
  //     _selectedMoveIdx (inclusive) and slice _payload.evals the same way.
  //   - Otherwise, use the full parsed object and full eval data.
  let effectiveParsed=parsed;
  let effectiveEvalData=_payload.evals;
  let effectiveSelectedIdx=_selectedMoveIdx;
  // v1.0.3: isBlackToMoveStart is propagated to effectiveParsed so that
  // renderStats / renderTimeChart / etc. can correctly identify White/Black
  // moves via moverIsWhite(i, effectiveParsed).
  const blackStart=parsed.isBlackToMoveStart;
  if(_fenSelected){
    // v1.0.3: FEN (initial position) is selected — show stats for the
    // starting position with 0 moves. Build an effectiveParsed with an
    // empty moves array but a startFEN so renderStats can compute
    // material/phase/pawn-structure stats from the initial position.
    const startState=parsed.startFEN?fenToState(parsed.startFEN):initState();
    effectiveParsed={headers:parsed.headers,moves:[],startFEN:parsed.startFEN,comments:parsed.comments,isBlackToMoveStart:blackStart,initialState:startState};
    effectiveEvalData=null;
    effectiveSelectedIdx=-1;
  }else if(_variationMoves){
    effectiveParsed={headers:parsed.headers,moves:_variationMoves,startFEN:parsed.startFEN,comments:parsed.comments,isBlackToMoveStart:blackStart};
    effectiveEvalData=null; // evals are mainline-only — can't reuse for variation
    // The selected index in the variation context is the LAST move in the
    // synthetic sequence (the variation move the user clicked).
    effectiveSelectedIdx=_variationMoves.length-1;
  }else if(_selectedMoveIdx>=0&&_selectedMoveIdx<parsed.moves.length){
    effectiveParsed={headers:parsed.headers,moves:parsed.moves.slice(0,_selectedMoveIdx+1),startFEN:parsed.startFEN,comments:parsed.comments,isBlackToMoveStart:blackStart};
    effectiveEvalData=_payload.evals?_payload.evals.slice(0,_selectedMoveIdx+1):null;
  }
  let h='';
  // v1.0.3: Selection banner — shows what move is currently selected (mainline
  // or variation) so the user understands the stats below correspond to that
  // specific position. Hidden when no move is selected.
  if(_variationMeta){
    // v1.0.3: The banner shows the RANGE of variation moves (1 to varClickedIdx+1)
    // and the total count, making it clear that the ENTIRE series replaces the
    // single mainline move — not just the clicked move.
    const varCount=_variationMeta.varClickedIdx+1; // total variation moves used
    const varEndNum=_variationMeta.varClickedIdx+1; // 1-based end of range
    const mainReplacedNum=_variationMeta.mainIdxReplaced+1; // 1-based mainline move number
    // select_var_hint has 3 %d placeholders: end-of-range, count, mainline-replaced
    const hint=T('select_var_hint').replace('%d',varEndNum).replace('%d',varCount).replace('%d',mainReplacedNum);
    h+='<div style="background:rgba(126,184,218,.12);border:1px solid rgba(126,184,218,.4);border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:.82rem;color:var(--accent2)"><span style="font-weight:600">'+T('variation_marker')+'</span> '+_escFEN(hint)+'</div>';
  }else if(_selectedMoveIdx>=0){
    const moveNum=Math.floor(_selectedMoveIdx/2)+1;
    const isWhite=moverIsWhite(_selectedMoveIdx,parsed);
    const hint=T('select_hint').replace('%d',moveNum+(isWhite?'.':'...'));
    h+='<div style="background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.4);border-radius:6px;padding:8px 12px;margin-bottom:14px;font-size:.82rem;color:var(--accent)">'+_escFEN(hint)+'</div>';
  }
  h+=renderPGNText(parsed,_payload.evals,_payload.comments);
  // v1.0.3: FEN panel — below PGN text panel, above stats.
  h+=renderFENPanel(effectiveParsed,effectiveSelectedIdx);
  h+=renderStats(effectiveParsed,effectiveEvalData);
  document.getElementById('content').innerHTML=h;
}

// v1.0.2: Select a mainline move for per-position statistics.
//   v1.0.3: Clears any variation selection first (mutually exclusive).
function selectMove(idx){
  _haptic('BUTTON_PRESS');
  // v1.0.3: Clear variation + FEN selection — mutually exclusive.
  _variationMoves=null;
  _variationMeta=null;
  _fenSelected=false;
  _selectedMoveIdx=(_selectedMoveIdx===idx)?-1:idx; // Toggle selection
  render();
}

// v1.0.3: Select the initial position (FEN) — shows stats for the starting
// position with 0 moves. This is used when the PGN has a [FEN] header and
// the user clicks on the FEN text in the PGN text panel.
function selectInitialPosition(){
  _haptic('BUTTON_PRESS');
  _fenSelected=!_fenSelected; // Toggle
  if(_fenSelected){
    _variationMoves=null;
    _variationMeta=null;
    _selectedMoveIdx=-1;
  }
  render();
}

// v1.0.3: Select a variation move for per-position statistics.
//   Builds a synthetic move sequence:
//     mainline[0..mainIdxBefore-1] + variation moves[0..varClickedIdx]
//   where mainIdxBefore = the index of the mainline move that the variation's
//   first move REPLACES (the move immediately to the LEFT of `(`).
//   The variation moves are re-parsed via applySANMove() starting from the
//   state after mainline[mainIdxBefore-1].
//   If a variation move fails to parse (applySANMove returns null), we stop
//   adding moves — this prevents broken stats from a partial sequence.
function selectVariationMove(varId,varClickedIdx){
  _haptic('BUTTON_PRESS');
  // Toggle off if the same variation move is clicked again.
  if(_variationMeta&&_variationMeta.varId===varId&&_variationMeta.varClickedIdx===varClickedIdx){
    _variationMoves=null;
    _variationMeta=null;
    _selectedMoveIdx=-1;
    render();
    return;
  }
  if(!_variations[varId])return;
  const v=_variations[varId];
  // Get the mainline parsed object to source mainline moves + starting state.
  const parsed=parsePGN(_payload.pgn);
  if(!parsed)return;
  // Starting state: state AFTER mainline[mainIdxBefore-1] (or initial state
  // if mainIdxBefore === 0).
  let state;
  if(v.mainIdxBefore>0&&parsed.moves[v.mainIdxBefore-1]){
    // Deep-copy the state to avoid mutating the cached parsed.moves entry.
    state=JSON.parse(JSON.stringify(parsed.moves[v.mainIdxBefore-1].state));
  }else{
    state=parsed.startFEN?fenToState(parsed.startFEN):initState();
  }
  // Build the synthetic move sequence.
  const synthMoves=[];
  // 1. Take mainline moves [0..mainIdxBefore-1] as-is.
  for(let i=0;i<v.mainIdxBefore;i++){
    synthMoves.push(parsed.moves[i]);
  }
  // 2. Re-parse variation moves[0..varClickedIdx] via applySANMove.
  //    The variation's first move REPLACES mainline[mainIdxBefore].
  //    applySANMove handles castling, promotion, captures, disambiguation.
  //    It uses state.currentTurn (inherited from the starting state) to
  //    determine which side is moving — no explicit side parameter needed.
  //    If a move fails to parse, we break out (partial sequence is still useful).
  for(let i=0;i<=varClickedIdx&&i<v.moves.length;i++){
    const san=v.moves[i];
    const result=applySANMove(state,san);
    if(result){
      synthMoves.push({
        notation:result.notation,
        from:result.from,
        to:result.to,
        piece:result.piece,
        captured:result.captured,
        state:{...result.postState},
        tokenIdx:-1,
        isVariation:true
      });
      state=result.postState;
    }else{
      // Failed to parse — stop adding moves. The synthetic sequence is still
      // valid up to this point (it just doesn't extend to varClickedIdx).
      break;
    }
  }
  // Set the variation selection state.
  _variationMoves=synthMoves;
  _variationMeta={varId,varClickedIdx,mainIdxReplaced:v.mainIdxBefore};
  _selectedMoveIdx=-1; // Clear mainline selection (mutually exclusive)
  _fenSelected=false; // Clear FEN selection (mutually exclusive)
  render();
}

// Button handlers
// v1.0.2: Haptic feedback helper for stats page buttons
function _haptic(type){
  try{
    if(typeof AndroidBridge!=='undefined'&&AndroidBridge.performHaptic){
      AndroidBridge.performHaptic(type);
    }
  }catch(e){}
}
// v1.0.3: Show the 💾HTML export dialog with two options + GPL v3 notice
function exportHTML(){
  _haptic('BUTTON_PRESS');
  _showStatsExportDialog();
}

function _showStatsExportDialog(){
  var overlay=document.createElement('div');
  overlay.className='dov';
  overlay.setAttribute('role','dialog');
  overlay.setAttribute('aria-modal','true');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10000';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  var dlg=document.createElement('div');
  dlg.className='dlg';
  dlg.style.cssText='max-width:440px;background:#221015;border:1px solid #d4a017;border-radius:12px;padding:20px;width:90%';
  var html='<h2 style="color:#ffd700;margin-bottom:16px;font-size:1.1rem">💾HTML</h2>';
  html+='<div style="display:flex;flex-direction:column;gap:10px">';
  html+='<button class="btn" style="width:100%;justify-content:center;gap:8px;padding:12px;font-size:.9rem" onclick="_haptic(\'BUTTON_PRESS\');this.closest(\'.dov\').remove();_exportStaticHTML()">📄 '+(_lang==='zh'?'导出此FEN的统计数据':'Export current position stats')+'</button>';
  html+='<button class="btn" style="width:100%;justify-content:center;gap:8px;padding:12px;font-size:.9rem" onclick="_haptic(\'BUTTON_PRESS\');this.closest(\'.dov\').remove();_exportFullHTML()">📊 '+(_lang==='zh'?'导出全PGN的统计数据':'Export full PGN stats')+'</button>';
  html+='</div>';
  // GPL v3 notice
  html+='<div style="margin-top:14px;padding:10px;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.3);border-radius:6px;font-size:.72rem;color:var(--text);line-height:1.5">';
  var notice=_lang==='zh'?'⚠️导出的HTML文件采用GPL v3授权（与DroidFish衍生的PGN解析一致）。分发导出的HTML文件时，您必须遵守许可证要求，包括完整的许可证文本和其他必要内容。您可通过以下渠道获取——':'⚠️The exported HTML file is licensed under GPL v3 to match the DroidFish-derived PGN parsing. When distributing exported HTML files, you must comply with the license requirements by including the full license text and other required contents. You may obtain them through the following channels——';
  html+='<span style="color:var(--text)">'+notice+'</span>';
  html+='<br><a href="https://github.com/YDW99/Regalia/blame/main/LICENSE%26NOTICE.zip" style="color:var(--accent2);word-break:break-all" target="_blank">https://github.com/YDW99/Regalia/blame/main/LICENSE%26NOTICE.zip</a>';
  html+='</div>';
  // GPL v3 logo at the bottom
  html+='<div style="text-align:center;margin-top:10px" id="_gplLogoHolder"></div>';
  html+='<div style="margin-top:12px;text-align:center"><button class="btn" onclick="_haptic(\'BUTTON_PRESS\');this.closest(\'.dov\').remove()">'+(_lang==='zh'?'取消':'Cancel')+'</button></div>';
  dlg.innerHTML=html;
  overlay.appendChild(dlg);
  document.body.appendChild(overlay);
  // Load GPL v3 logo — display at bottom of dialog
  try{if(typeof AndroidBridge!=='undefined'&&AndroidBridge.loadAssetAsBase64){var b64=AndroidBridge.loadAssetAsBase64('GPLv3_Logo.svg');if(b64){var holder=document.getElementById('_gplLogoHolder');if(holder)holder.innerHTML='<img src="data:image/svg+xml;base64,'+b64+'" alt="GPL v3" style="width:140px;height:auto;opacity:.95" />';}}}catch(e){}
}

// v1.0.3: Export static HTML (current selection frozen, no JS, no buttons, no hint, no copy)
function _exportStaticHTML(){
  let styleCSS='';
  const styleEl=document.querySelector('style');
  if(styleEl)styleCSS=styleEl.textContent;
  const contentEl=document.getElementById('content');
  let contentHTML='<div class="loading">No data</div>';
  if(contentEl){
    const contentClone=contentEl.cloneNode(true);
    contentClone.querySelectorAll('[onclick]').forEach(function(el){el.removeAttribute('onclick');});
    // v1.0.3: Remove FEN panel hint text, label, and copy button from export.
    // The hint is inside .fen-label as a nested <span> (no class), so we
    // remove the entire .fen-label, .fen-copy-row, and .fen-hint.
    contentClone.querySelectorAll('.fen-hint').forEach(function(el){el.remove();});
    contentClone.querySelectorAll('.fen-copy-row').forEach(function(el){el.remove();});
    // Remove the hint span inside fen-label (the span with muted color text)
    contentClone.querySelectorAll('.fen-label > span').forEach(function(el){el.remove();});
    contentHTML=contentClone.innerHTML;
  }
  const langAttr=_lang==='zh'?'zh':'en';
  const title=_lang==='zh'?'📊统计数据 — 静态导出':'📊Statistics — Static Export';
  const staticHTML='<!DOCTYPE html>\n<html lang="'+langAttr+'">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>'+title+'</title>\n<style>\nbody{background:#1a0a0a;margin:0;padding:0}\n'+styleCSS+'\n</style>\n</head>\n<body>\n<div class="content">'+contentHTML+'</div>\n</body>\n</html>';
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.exportStatsHTML){AndroidBridge.exportStatsHTML(staticHTML);}
}

// v1.0.3: Export full interactive HTML — selectable moves, no header buttons
function _exportFullHTML(){
  let styleCSS='';
  const styleEl=document.querySelector('style');
  if(styleEl)styleCSS=styleEl.textContent;
  const pgnText=_payload?_payload.pgn:'';
  const lang=_lang||'zh';
  // Extract the script from current page
  const scriptEl=document.querySelector('script');
  let scriptJS=scriptEl?scriptEl.textContent:'';
  // v1.0.3 FIX: Instead of regex-stripping AndroidBridge calls (which corrupts
  // init() due to nested braces), we simply DON'T define AndroidBridge in the
  // exported HTML. The `typeof AndroidBridge!=='undefined'` checks will all
  // return false, so the code inside those blocks is naturally skipped.
  // We only need to:
  // 1. Remove the conflicting `let _payload=null;` and `let _lang='zh';`
  // 2. Prepend our embedded payload
  // 3. Replace a few button functions with empty stubs (for cleanliness)
  scriptJS=scriptJS.replace(/let _payload=null;/,'');
  scriptJS=scriptJS.replace(/let _lang='zh';/,'');
  // Replace button functions with empty stubs
  scriptJS=scriptJS.replace(/function exportHTML\(\)\{[\s\S]*?\n\}/m,'function exportHTML(){}');
  scriptJS=scriptJS.replace(/function requestImport\(\)\{[\s\S]*?\n\}/m,'function requestImport(){}');
  scriptJS=scriptJS.replace(/function requestReview\(\)\{[\s\S]*?\n\}/m,'function requestReview(){}');
  scriptJS=scriptJS.replace(/function returnToGame\(\)\{[\s\S]*?\n\}/m,'function returnToGame(){}');
  scriptJS=scriptJS.replace(/function _showStatsImportDialog\(\)\{[\s\S]*?\n\}/m,'function _showStatsImportDialog(){}');
  scriptJS=scriptJS.replace(/function _showStatsExportDialog\(\)\{[\s\S]*?\n\}/m,'function _showStatsExportDialog(){}');
  scriptJS=scriptJS.replace(/function _exportStaticHTML\(\)\{[\s\S]*?\n\}/m,'function _exportStaticHTML(){}');
  scriptJS=scriptJS.replace(/function _exportFullHTML\(\)\{[\s\S]*?\n\}/m,'function _exportFullHTML(){}');
  scriptJS=scriptJS.replace(/function _updateButtonText\(\)\{[\s\S]*?\n\}/m,'function _updateButtonText(){}');
  // Prepend embedded payload
  scriptJS='var _payload={pgn:'+JSON.stringify(pgnText)+',lang:'+JSON.stringify(lang)+'};\n'+
    'var _lang='+JSON.stringify(lang)+';\n'+
    scriptJS;

  const title=lang==='zh'?'📊统计数据 — 完整导出':'📊Statistics — Full Export';
  const fullHTML='<!DOCTYPE html>\n'+
    '<html lang="'+lang+'">\n'+
    '<head>\n'+
    '<meta charset="UTF-8">\n'+
    '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n'+
    '<title>'+title+'</title>\n'+
    '<style>\n'+styleCSS+'\n</style>\n'+
    '</head>\n'+
    '<body>\n'+
    '<div class="content" id="content"><div class="loading">'+(lang==='zh'?'加载中...':'Loading...')+'</div></div>\n'+
    '<scr'+'ipt>\n'+scriptJS+'\n</scr'+'ipt>\n'+
    '</body>\n'+
    '</html>';
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.exportStatsHTML){AndroidBridge.exportStatsHTML(fullHTML);}
}

function requestImport(){
  _haptic('BUTTON_PRESS');
  // v1.0.2: Show the import dialog WITHIN the stats page (not on the main page)
  // The dialog has only PGN options (paste PGN, select PGN file) — no FEN option
  _showStatsImportDialog();
}

// v1.0.2: Show import dialog within stats page
function _showStatsImportDialog(){
  var overlay=document.createElement('div');
  overlay.className='dov';
  overlay.setAttribute('role','dialog');
  overlay.setAttribute('aria-modal','true');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10000';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  var dlg=document.createElement('div');
  dlg.className='dlg';
  dlg.style.cssText='max-width:420px;background:#221015;border:1px solid #d4a017;border-radius:12px;padding:20px;width:90%';
  var html='<h2 style="color:#ffd700;margin-bottom:16px;font-size:1.1rem">'+(_lang==='zh'?'🗃️ 导入PGN':'🗃️ Import PGN')+'</h2>';
  html+='<div style="display:flex;flex-direction:column;gap:10px">';
  html+='<button class="btn" style="width:100%;justify-content:center;gap:8px;padding:12px;font-size:.9rem" onclick="_statsPastePGN()"><span style="font-size:1.3rem">📜</span> '+(_lang==='zh'?'粘贴PGN':'Paste PGN')+'</button>';
  html+='<button class="btn" style="width:100%;justify-content:center;gap:8px;padding:12px;font-size:.9rem" onclick="_statsSelectPGNFile()"><span style="font-size:1.3rem">📂</span> '+(_lang==='zh'?'选择PGN文件':'Select PGN File')+'</button>';
  html+='</div>';
  html+='<div style="margin-top:12px;text-align:center"><button class="btn" onclick="_haptic(\x27BUTTON_PRESS\x27);this.closest(\x27.dov\x27).remove()">'+(_lang==='zh'?'取消':'Cancel')+'</button></div>';
  dlg.innerHTML=html;
  overlay.appendChild(dlg);
  document.body.appendChild(overlay);
}

function _statsPastePGN(){
  _haptic('BUTTON_PRESS');
  var overlay=document.querySelector('.dov[role="dialog"]');
  if(overlay)overlay.remove();
  var text=prompt(_lang==='zh'?'粘贴PGN文本:':'Paste PGN text:');
  // v1.0.2 CLEANUP: Removed the AndroidBridge.statsRequestImport feature check
  // — it was leftover from an earlier design where paste sent the PGN to the
  // main WebView. Paste now stays entirely inside stats.html: just update the
  // payload and re-render. The check had the side effect of silently dropping
  // the paste if the bridge method was absent (which it now is — see the
  // statsSelectPGNFile cleanup).
  if(text){
    _payload.pgn=text;
    // v1.0.3 FIX: Clear moveRecords + evals from the PREVIOUS game when a new
    // PGN is pasted. Without this, parsePGN() would detect _payload.moveRecords
    // as non-null and call parseFromMoveRecords() — replaying the STALE records
    // instead of parsing the newly pasted PGN text. This was the root cause of
    // "imported PGN not recognized" — the metadata (headers) was extracted from
    // the new PGN but the moves/positions came from the old game's moveRecords.
    // Clearing moveRecords forces parsePGN to fall back to the simplified SAN
    // parser, which correctly parses the pasted text.
    _payload.moveRecords=null;
    _payload.evals=null;
    _selectedMoveIdx=-1;
    _variationMoves=null;
    _variationMeta=null;
    render();
  }
}

function _statsSelectPGNFile(){
  _haptic('BUTTON_PRESS');
  var overlay=document.querySelector('.dov[role="dialog"]');
  if(overlay)overlay.remove();
  // v1.0.2 FIX: Open SAF file picker directly from StatsActivity — no longer
  // bounces back to the main activity. The Java side reads the file and calls
  // onStatsPGNFileRead(content) which updates _payload.pgn and re-renders.
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.statsSelectPGNFile){
    AndroidBridge.statsSelectPGNFile();
  }
}

// v1.0.2 FIX: Callback invoked by StatsActivity.onActivityResult after a PGN
// file has been picked and read. Updates the payload and re-renders the stats
// page with the imported PGN (mirrors _statsPastePGN behavior).
function onStatsPGNFileRead(content){
  if(!content){
    // Empty content = picker cancelled or read failed — no state change.
    return;
  }
  _payload.pgn=content;
  // v1.0.3 FIX: Clear moveRecords + evals from the PREVIOUS game when a new
  // PGN is imported via file picker. Same root cause as _statsPastePGN —
  // see the detailed comment there. Without this clear, parsePGN() would
  // replay stale moveRecords instead of parsing the newly imported PGN.
  _payload.moveRecords=null;
  _payload.evals=null;
  _selectedMoveIdx=-1;
  _variationMoves=null;
  _variationMeta=null;
  render();
}
function requestReview(){
  _haptic('BUTTON_PRESS');
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.statsRequestReview){
    AndroidBridge.statsRequestReview();
  }
}
function returnToGame(){
  _haptic('BUTTON_PRESS');
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.closeStatsPage){
    AndroidBridge.closeStatsPage();
  }
}

// Initialize — get payload from Java bridge
function init(){
  if(typeof AndroidBridge!=='undefined'&&AndroidBridge.getStatsPayload){
    try{
      const payloadStr=AndroidBridge.getStatsPayload();
      if(payloadStr){
        _payload=JSON.parse(payloadStr);
        if(_payload.lang)_lang=_payload.lang;
      }
    }catch(e){console.error('init error:',e);}
  }
  // Update button text based on language
  _updateButtonText();
  render();
}

// Update button text based on current language
function _updateButtonText(){
  const importText=document.getElementById('btnImportText');
  if(importText)importText.textContent=_lang==='zh'?'导入':'Import';
  const reviewText=document.getElementById('btnReviewText');
  if(reviewText)reviewText.textContent=_lang==='zh'?'复盘':'Review';
  const backBtn=document.getElementById('btnBack');
  if(backBtn)backBtn.textContent=_lang==='zh'?'返回':'Back';
  // Update title
  const titleEl=document.querySelector('.hdr h1');
  if(titleEl)titleEl.textContent=_lang==='zh'?'📊统计数据':'📊Statistics';
  // Update loading text
  const loadingEl=document.getElementById('content');
  if(loadingEl&&loadingEl.querySelector('.loading')){
    loadingEl.innerHTML='<div class="loading">'+(_lang==='zh'?'加载中...':'Loading...')+'</div>';
  }
}

// Handle Android back button — return to main game
document.addEventListener('keydown',function(e){
  if(e.key==='Backspace'||e.keyCode===8){
    e.preventDefault();
    returnToGame();
  }
});

window.addEventListener('load',init);
</script>
