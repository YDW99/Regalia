<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📊统计数据</title>
<style>
/* AI-GEN: AI assisted
   This code was AI-assisted and has been reviewed for GPL v3 compliance.
   Modified by Regalia on 2026-06-18: stats.html template for 📊统计 feature.
   v1.0.3 (2026-06-20): time-management analysis from PGN {1.0s ...} comments,
   clickable variation moves with synthetic-mainline reconstruction,
   FEN panel below PGN text panel, bilingual UI.
   Original PGN parsing logic derived from DroidFish (GPL v3).
   This file is licensed under GPL v3 to match the DroidFish-derived PGN parsing. */
:root{
  --bg:#1a0a0a;--card:#2a1a0a;--text:#f5e6c8;--muted:#a08050;
  --accent:#d4a017;--accent2:#7eb8da;--border:#4a3520;
  --w-piece:#E8E8F0;--w-stroke:rgba(30,15,0,.85);--w-shadow:rgba(30,15,0,.55);
  --b-piece:#1A1A2E;--b-stroke:rgba(255,230,150,.85);--b-shadow:rgba(255,230,150,.55);
  --comment:#1a3a8a;--variation:#666;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:16px;line-height:1.5;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(145deg,#2a1a0a,#1a0a0a);border-bottom:2px solid var(--accent);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hdr h1{font-size:1.15rem;color:var(--accent);font-weight:700;letter-spacing:.5px}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:rgba(212,160,23,.15);color:var(--text);border:1px solid rgba(212,160,23,.4);border-radius:6px;padding:6px 12px;font-size:.8rem;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.btn:active{background:rgba(212,160,23,.35)}
.content{padding:14px;max-width:900px;margin:0 auto}
.section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.section h2{color:var(--accent);font-size:1rem;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.pgn-display{font-size:1.15rem;line-height:1.8;font-family:'Noto Sans','Segoe UI',sans-serif;word-wrap:break-word}
.pgn-display .move-num{color:var(--muted);font-weight:600}
.pgn-display .move{color:var(--text);font-weight:500;cursor:pointer}
.pgn-display .move:hover{text-decoration:underline}
.pgn-display .comment{color:var(--comment);font-style:italic;font-size:1rem}
.pgn-display .variation{color:var(--variation);font-size:1rem;font-style:italic}
.pgn-display .header-tag{color:var(--accent2);font-size:.95rem;display:block;margin-bottom:2px}
/* v1.0.2 FIX: Increase specificity so piece symbol colors override .pgn-display .move.
   Previously .pgn-display .move (specificity 0,2,0) overrode .piece-white/.piece-black
   (specificity 0,1,0), so ALL move text was cream-colored and the piece symbols never
   got their white/black color/stroke/glow. Now the piece symbol span uses these
   higher-specificity rules and matches the main board's piece styling exactly. */
.pgn-display .move .piece-white,.pgn-display .variation .piece-white{color:#E8E8F0;-webkit-text-stroke:.3px rgba(30,15,0,.85);text-shadow:0 0 .8px rgba(30,15,0,.55);font-family:'DejaVu Sans','Noto Sans','Segoe UI Symbol',sans-serif;font-variant-emoji:text;font-weight:400}
.pgn-display .move .piece-black,.pgn-display .variation .piece-black{color:#1A1A2E;-webkit-text-stroke:.3px rgba(255,230,150,.85);text-shadow:0 0 .8px rgba(255,230,150,.55);font-family:'DejaVu Sans','Noto Sans','Segoe UI Symbol',sans-serif;font-variant-emoji:text;font-weight:400}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat-item{background:rgba(0,0,0,.2);border-radius:6px;padding:10px;text-align:center}
.stat-item .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-item .value{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stat-item .value.white{color:#e8e8f0}
.stat-item .value.black{color:#a0a0c0}
.eval-chart{width:100%;height:120px;background:rgba(0,0,0,.3);border-radius:6px;margin-top:8px}
.material-chart{width:100%;height:80px;background:rgba(0,0,0,.3);border-radius:6px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.85rem}
table th,table td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
table th{color:var(--accent);font-weight:600}
table tr:hover{background:rgba(212,160,23,.05)}
.classification{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.classification.brilliant{background:#5cb85c;color:#fff}
.classification.best{background:#3a8;color:#fff}
.classification.good{background:#a0c060;color:#1a0a0a}
.classification.inaccuracy{background:#f0c040;color:#1a0a0a}
.classification.mistake{background:#e08030;color:#fff}
.classification.blunder{background:#c0392b;color:#fff}
.classification.book{background:#888;color:#fff}
.loading{color:var(--muted);text-align:center;padding:20px}
.piece-white{color:#E8E8F0;-webkit-text-stroke:.3px rgba(30,15,0,.85);text-shadow:0 0 .8px rgba(30,15,0,.55);font-family:'DejaVu Sans','Noto Sans','Segoe UI Symbol',sans-serif;font-variant-emoji:text;font-weight:400}
.piece-black{color:#1A1A2E;-webkit-text-stroke:.3px rgba(255,230,150,.85);text-shadow:0 0 .8px rgba(255,230,150,.55);font-family:'DejaVu Sans','Noto Sans','Segoe UI Symbol',sans-serif;font-variant-emoji:text;font-weight:400}
.move{cursor:pointer;padding:1px 3px;border-radius:3px;transition:background .15s}
.move:hover{background:rgba(212,160,23,.15)}
.move.selected{background:rgba(212,160,23,.3);font-weight:600}
/* v1.0.3: FEN inline display in PGN text — smaller font, monospace, selectable */
.fen-inline{background:rgba(126,184,218,.1);border:1px solid rgba(126,184,218,.3)}
.fen-inline:hover{background:rgba(126,184,218,.2)}
.fen-inline.selected{background:rgba(126,184,218,.3);font-weight:600}
/* v1.0.3: variation moves are now clickable — give them a subtle underline-on-hover
   and a slightly different background when selected, so the user can tell apart
   "mainline move selected" vs "variation move selected". */
.pgn-display .variation .move:hover{background:rgba(126,184,218,.18)}
.pgn-display .variation .move.selected{background:rgba(126,184,218,.32);font-weight:600}
/* v1.0.3: "var-included" — variation moves from index 0 up to (but not including)
   the clicked move. These are ALSO part of the synthetic sequence that replaces
   the mainline move. We give them a lighter highlight than "selected" so the
   user can see the entire series is being used, not just the clicked move. */
.pgn-display .variation .move.var-included{background:rgba(126,184,218,.15);font-weight:500}
/* v1.0.3: FEN panel — below the PGN text panel. Monospace, selectable,
   word-break so long FENs wrap on small screens. The copy button is placed
   at the BOTTOM-right via flexbox (not absolute top-right) so it never
   overlaps the FEN text on long FENs. */
.fen-panel{background:rgba(0,0,0,.28);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:14px;font-family:'Sarasa Mono SC','Noto Sans Mono','DejaVu Sans Mono',monospace;font-size:.82rem;line-height:1.5;color:var(--accent2);word-break:break-all;user-select:text;-webkit-user-select:text;cursor:text;position:relative;display:flex;flex-direction:column;gap:6px}
.fen-panel .fen-label{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:0;font-family:system-ui,-apple-system,sans-serif}
.fen-panel .fen-value{display:block;color:var(--accent2);font-family:inherit;white-space:pre-wrap}
/* v1.0.3: copy button row — aligned to the bottom-right, never overlaps FEN text */
.fen-panel .fen-copy-row{display:flex;justify-content:flex-end;margin-top:2px}
.fen-panel .fen-copy{background:rgba(212,160,23,.15);color:var(--accent);border:1px solid rgba(212,160,23,.4);border-radius:4px;padding:3px 10px;font-size:.7rem;cursor:pointer;font-family:system-ui,-apple-system,sans-serif}
.fen-panel .fen-copy:active{background:rgba(212,160,23,.35)}
.fen-panel .fen-hint{color:var(--muted);font-style:italic;font-size:.78rem}
/* v1.0.3: time-management chart — bar chart of per-move thinking time. */
.time-chart{width:100%;height:120px;background:rgba(0,0,0,.3);border-radius:6px;margin-top:8px}
.time-chart-bar{fill:#d4a017;transition:fill .15s}
.time-chart-bar.white{fill:#E8E8F0}
.time-chart-bar.black{fill:#7eb8da}
@media(max-width:600px){.content{padding:8px}.hdr{padding:8px}.hdr h1{font-size:1rem}.btn{padding:4px 8px;font-size:.75rem}.fen-panel{font-size:.75rem;padding:8px}.fen-panel .fen-copy{font-size:.65rem;padding:2px 8px}}

// Piece symbols with styling matching main chess.html
const SYM={
  white:{king:'♔\uFE0E',queen:'♕\uFE0E',rook:'♖\uFE0E',bishop:'♗\uFE0E',knight:'♘\uFE0E',pawn:'♙\uFE0E'},
  black:{king:'♚\uFE0E',queen:'♛\uFE0E',rook:'♜\uFE0E',bishop:'♝\uFE0E',knight:'♞\uFE0E',pawn:'♟\uFE0E'}
};
const PIECE_VALUE={pawn:1,knight:3,bishop:3,rook:5,queen:9,king:0};

// Initialize board
function initBoard(){
  const b=[];
  for(let r=0;r<8;r++){b[r]=[];for(let c=0;c<8;c++)b[r][c]=null;}
  b[0]=[{type:'rook',color:'black'},{type:'knight',color:'black'},{type:'bishop',color:'black'},{type:'queen',color:'black'},{type:'king',color:'black'},{type:'bishop',color:'black'},{type:'knight',color:'black'},{type:'rook',color:'black'}];
  b[1]=[];for(let c=0;c<8;c++)b[1][c]={type:'pawn',color:'black'};
  b[6]=[];for(let c=0;c<8;c++)b[6][c]={type:'pawn',color:'white'};
  b[7]=[{type:'rook',color:'white'},{type:'knight',color:'white'},{type:'bishop',color:'white'},{type:'queen',color:'white'},{type:'king',color:'white'},{type:'bishop',color:'white'},{type:'knight',color:'white'},{type:'rook',color:'white'}];
  return b;
}

function initState(){
  return {board:initBoard(),currentTurn:'white',castlingRights:{whiteKingside:true,whiteQueenside:true,blackKingside:true,blackQueenside:true},enPassantTarget:null,halfMoveClock:0,fullMoveNumber:1,wk:{row:7,col:4},bk:{row:0,col:4}};
}

const OPP_COLOR={white:'black',black:'white'};

// Parse PGN — simplified version of DroidFish PgnScanner
// v1.0.2 FIX: If _payload.moveRecords is available (sent by the main app), use
// them directly to rebuild the states instead of re-parsing the PGN string.
// The simplified SAN parser (applySANMove/canMoveTo) doesn't handle check
// detection, proper disambiguation, en passant edge cases, etc. — once one
// move fails to parse, the state doesn't advance and all subsequent moves
// cascade-fail. This was the root cause of the "total moves cannot exceed 98"
// bug. By replaying the authoritative move records from the main app (which
// uses the full legalMoves/moveAlg logic), we get correct move counts and
// states for games of any length.
function parsePGN(pgnText){
  if(!pgnText)return null;
  // Normalize
  let text=pgnText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  // Extract headers
  const headers={};
  const headerRe=/\[(\w+)\s+"([^"]*)"\]/g;
  let hm;
  while((hm=headerRe.exec(text))!==null){
    headers[hm[1]]=hm[2];
  }
  // Extract FEN if present
  let startFEN=headers.FEN||null;
  // v1.0.3: Detect Black-to-move start. Two signals:
  //   (a) FEN header with side-to-move = 'b'
  //   (b) PGN movetext starts with a "N..." move-number prefix (Black's move first)
  // When isBlackToMoveStart is true, the first move (moves[0]) is Black's,
  // so the i%2 side-identification in renderStats must be inverted.
  let isBlackToMoveStart=false;
  if(startFEN){
    const fenParts=startFEN.split(/\s+/);
    if(fenParts.length>=2&&fenParts[1]==='b')isBlackToMoveStart=true;
  }
  // Extract comments (for display in PGN text section)
  const comments=[];
  let cText=pgnText.replace(/\r\n/g,'\n');
  const commentRe=/\{([^{}]*)\}/g;
  let cm;
  while((cm=commentRe.exec(cText))!==null){
    comments.push(cm[1].trim());
  }

  // v1.0.2 FIX: If the main app sent authoritative move records, replay them
  // to build the parsed moves + states. This avoids the simplified SAN parser's
  // cascade-failure bug.
  if(typeof _payload!=='undefined'&&_payload&&_payload.moveRecords&&Array.isArray(_payload.moveRecords)){
    // v1.0.3: Detect Black-to-move from moveRecords — if records[0] is null
    // (the Black-to-move placeholder), the first real move is Black's.
    if(_payload.moveRecords.length>0&&!_payload.moveRecords[0]){
      isBlackToMoveStart=true;
    }
    const result=parseFromMoveRecords(_payload.moveRecords,startFEN,headers,comments);
    if(result)result.isBlackToMoveStart=isBlackToMoveStart;
    return result;
  }

  // v1.0.3: If no FEN header, detect Black-to-move from the movetext.
  // A Black-to-move PGN starts with "1..." (or "N...") before the first move.
  if(!isBlackToMoveStart){
    // Strip headers, then check if the first move-number token ends with "..."
    let mtCheck=text.replace(/^\[.*\]$/gm,'').trim();
    const firstNumMatch=mtCheck.match(/^(\d+\.+)/);
    if(firstNumMatch&&firstNumMatch[1].includes('...')){
      isBlackToMoveStart=true;
    }
  }

  // Fallback: parse PGN string with simplified parser (for pasted/imported PGN
  // where no move records are available)
  // Remove headers
  let moveText=text.replace(/\[[^\]]*\]/g,'');
  // Remove comments (brace-style)
  while(moveText.includes('{'))moveText=moveText.replace(/\{[^{}]*\}/g,'');
  // Remove semicolon comments
  moveText=moveText.replace(/;[^\n]*/g,'');
  // Remove NAGs
  moveText=moveText.replace(/\$\d+/g,'');
  // Remove results
  moveText=moveText.replace(/\b1-0\b|\b0-1\b|\b1\/2-1\/2\b|\*/g,'');
  // Normalize whitespace
  moveText=moveText.replace(/\s+/g,' ').trim();
  // Tokenize — preserve parentheses and braces for variations/comments
  // Pad parens with spaces
  moveText=moveText.replace(/\(/g,' ( ').replace(/\)/g,' ) ');
  // Now parse moves from moveText
  const tokens=moveText.match(/\S+/g)||[];
  const moves=[];
  let state=startFEN?fenToState(startFEN):initState();
  if(!state)return null;
  let tokenIdx=0;
  let inVariation=0;
  for(const token of tokens){
    if(token==='('){inVariation++;continue;}
    if(token===')'){inVariation=Math.max(0,inVariation-1);continue;}
    if(inVariation>0)continue; // Skip variation moves for now
    // Skip move numbers (e.g. "1.", "2...")
    if(/^\d+\.+$/.test(token))continue;
    // Strip move number prefix (e.g. "1.e4" → "e4")
    const clean=token.replace(/^\d+\.+\s*/,'').replace(/[!?]+$/,'').replace(/[+#]+$/,'');
    if(!clean)continue;
    // Try to apply the move
    const result=applySANMove(state,clean);
    if(result){
      moves.push({
        notation:result.notation,
        from:result.from,
        to:result.to,
        piece:result.piece,
        captured:result.captured,
        state:{...result.postState},
        tokenIdx:tokenIdx
      });
      state=result.postState;
    }
    tokenIdx++;
  }
  return {headers,moves,startFEN,comments,isBlackToMoveStart};
}

// v1.0.2 FIX: Build parsed moves from authoritative move records sent by the
// main app. Each record has {from, to, piece, captured, promotion, notation}.
// We replay each move via executeMove() to build the post-state, which is
// needed for material/phase/pawn-structure stats.
// v1.0.2 FIX: Null records (Black-to-move placeholder) are SKIPPED, not
// preserved as null in the moves array. The stats page's loops assume every
// entry in `moves` is a valid move object with `.state`, `.notation`, etc.
// A null entry would crash `moves[i].state.board` and break all stats.
// Skipping nulls keeps the parity correct: if moveRecords[0] is null (Black
// to move first), then moveRecords[1] (Black's first move) becomes moves[0]
// in the stats page, and i%2===0 correctly identifies it as a Black move
// (since the parity is preserved relative to the actual game).
// v1.0.2 FIX: The main app stores from/to as algebraic STRINGS ("e2", "e4"),
// but stats.html's executeMove expects {row, col} objects. Convert here.
function parseFromMoveRecords(records,startFEN,headers,comments){
  const moves=[];
  let state=startFEN?fenToState(startFEN):initState();
  if(!state)return null;
  // Convert algebraic string ("e2") to {row, col} — inverse of posAlg
  function algToObj(a){
    if(!a||typeof a!=='string'||a.length<2)return null;
    const col=a.charCodeAt(0)-97;
    const row=8-parseInt(a[1]);
    if(col<0||col>7||row<0||row>7)return null;
    return {row,col};
  }
  for(let i=0;i<records.length;i++){
    const rec=records[i];
    if(!rec){
      // null placeholder (Black-to-move start) — skip, don't push to moves.
      continue;
    }
    const fromObj=algToObj(rec.from);
    const toObj=algToObj(rec.to);
    if(!fromObj||!toObj||!rec.piece){
      continue;
    }
    const moveObj={
      from:fromObj,
      to:toObj,
      piece:rec.piece,
      promotion:rec.promotion||null
    };
    const result=executeMove(state,moveObj,rec.notation||'');
    if(result){
      moves.push({
        notation:result.notation,
        from:result.from,
        to:result.to,
        piece:result.piece,
        captured:result.captured,
        state:{...result.postState},
        tokenIdx:i
      });
      state=result.postState;
    }
  }
  return {headers,moves,startFEN,comments};
}

// Convert FEN to state (simplified)
function fenToState(fen){
  if(!fen)return null;
  try{
    const parts=fen.trim().split(/\s+/);
    if(parts.length<4)return null;
    const board=[];
    const rows=parts[0].split('/');
    if(rows.length!==8)return null;
    for(let r=0;r<8;r++){
      board[r]=[];
      let c=0;
      for(const ch of rows[r]){
        if(/\d/.test(ch)){c+=parseInt(ch);continue;}
        const pieceMap={'P':'pawn','N':'knight','B':'bishop','R':'rook','Q':'queen','K':'king'};
        const upper=ch.toUpperCase();
        if(!pieceMap[upper])return null;
        board[r][c]={type:pieceMap[upper],color:ch===upper?'white':'black'};
        c++;
      }
      while(c<8){board[r][c]=null;c++;}
    }
    const currentTurn=parts[1]==='w'?'white':'black';
    const castlingRights={whiteKingside:false,whiteQueenside:false,blackKingside:false,blackQueenside:false};
    if(parts[2].includes('K'))castlingRights.whiteKingside=true;
    if(parts[2].includes('Q'))castlingRights.whiteQueenside=true;
    if(parts[2].includes('k'))castlingRights.blackKingside=true;
    if(parts[2].includes('q'))castlingRights.blackQueenside=true;
    let wk=null,bk=null;
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const p=board[r][c];
      if(p&&p.type==='king'){if(p.color==='white')wk={row:r,col:c};else bk={row:r,col:c};}
    }
    return {board,currentTurn,castlingRights,enPassantTarget:null,halfMoveClock:0,fullMoveNumber:parseInt(parts[5])||1,wk,bk};
  }catch(e){return null;}
}

// Apply SAN move (simplified — uses constraint matching)
function applySANMove(state,san){
  if(!state||!san)return null;
  let cleanSAN=san.replace(/[!?]+$/,'').replace(/[+#]+$/,'');
  if(!cleanSAN)return null;
  // Castling
  if(cleanSAN==='O-O'||cleanSAN==='0-0'){
    const row=state.currentTurn==='white'?7:0;
    return executeMove(state,{from:{row,col:4},to:{row,col:6}},'O-O');
  }
  if(cleanSAN==='O-O-O'||cleanSAN==='0-0-0'){
    const row=state.currentTurn==='white'?7:0;
    return executeMove(state,{from:{row,col:4},to:{row,col:2}},'O-O-O');
  }
  // Parse SAN: [Piece][disambiguation][x][dest][=Promo]
  let idx=0;
  let pieceType='pawn';
  if('KQRBN'.includes(cleanSAN[0])){pieceType={K:'king',Q:'queen',R:'rook',B:'bishop',N:'knight'}[cleanSAN[0]];idx=1;}
  let promotion=null;
  const promoMatch=cleanSAN.match(/=([QRBN])/i);
  if(promoMatch){
    promotion={Q:'queen',R:'rook',B:'bishop',N:'knight'}[promoMatch[1].toUpperCase()];
    cleanSAN=cleanSAN.replace(/=[QRBN]/i,'');
  }
  if(pieceType==='pawn'&&cleanSAN.length>=3){
    const lastChar=cleanSAN[cleanSAN.length-1];
    if('QRBN'.includes(lastChar)){
      promotion={Q:'queen',R:'rook',B:'bishop',N:'knight'}[lastChar];
      cleanSAN=cleanSAN.slice(0,-1);
    }
  }
  if(cleanSAN.length<2)return null;
  const destStr=cleanSAN.slice(-2);
  const destCol=destStr.charCodeAt(0)-97;
  const destRow=8-parseInt(destStr[1]);
  if(destCol<0||destCol>7||destRow<0||destRow>7)return null;
  // Disambiguation
  let disambFile=-1,disambRank=-1;
  let rest=cleanSAN.slice(idx,-2);
  if(rest.includes('x'))rest=rest.replace('x','');
  for(const ch of rest){
    if(ch>='a'&&ch<='h')disambFile=ch.charCodeAt(0)-97;
    else if(ch>='1'&&ch<='8')disambRank=8-parseInt(ch);
  }
  // Find matching piece
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const p=state.board[r][c];
      if(!p||p.type!==pieceType||p.color!==state.currentTurn)continue;
      if(disambFile>=0&&c!==disambFile)continue;
      if(disambRank>=0&&r!==disambRank)continue;
      // Check if this piece can move to dest
      if(canMoveTo(state,r,c,destRow,destCol)){
        return executeMove(state,{from:{row:r,col:c},to:{row:destRow,col:destCol},piece:p,promotion},'');
      }
    }
  }
  return null;
}

function canMoveTo(state,fromR,fromC,toR,toC){
  // Simplified — just check pseudo-legal moves
  const p=state.board[fromR][fromC];
  if(!p)return false;
  const dr=toR-fromR,dc=toC-fromC;
  if(p.type==='pawn'){
    const dir=p.color==='white'?-1:1;
    const startRow=p.color==='white'?6:1;
    if(dc===0&&dr===dir&&!state.board[toR][toC])return true;
    if(dc===0&&dr===2*dir&&fromR===startRow&&!state.board[toR][toC]&&!state.board[fromR+dir][fromC])return true;
    if(Math.abs(dc)===1&&dr===dir&&state.board[toR][toC]&&state.board[toR][toC].color!==p.color)return true;
    return false;
  }
  if(p.type==='knight'){
    return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);
  }
  if(p.type==='king'){
    return Math.abs(dr)<=1&&Math.abs(dc)<=1&&(dr!==0||dc!==0);
  }
  // Sliding pieces
  const dirs=[];
  if(p.type==='rook'||p.type==='queen'){dirs.push([-1,0],[1,0],[0,-1],[0,1]);}
  if(p.type==='bishop'||p.type==='queen'){dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);}
  for(const [ddr,ddc] of dirs){
    let nr=fromR+ddr,nc=fromC+ddc;
    while(nr>=0&&nr<8&&nc>=0&&nc<8){
      if(nr===toR&&nc===toC)return true;
      if(state.board[nr][nc])break;
      nr+=ddr;nc+=ddc;
    }
  }
  return false;
}

function executeMove(state,move,notation){
  const newState={board:state.board.map(r=>r.map(c=>c?{...c}:null)),currentTurn:OPP_COLOR[state.currentTurn],castlingRights:{...state.castlingRights},enPassantTarget:null,halfMoveClock:state.halfMoveClock+1,fullMoveNumber:state.fullMoveNumber,wk:state.wk?{...state.wk}:null,bk:state.bk?{...state.bk}:null};
  const piece=newState.board[move.from.row][move.from.col];
  if(!piece)return null;
  const captured=newState.board[move.to.row][move.to.col];
  newState.board[move.to.row][move.to.col]=piece;
  newState.board[move.from.row][move.from.col]=null;
  if(move.promotion)newState.board[move.to.row][move.to.col]={type:move.promotion,color:piece.color};
  if(piece.type==='king'){
    if(piece.color==='white')newState.wk={row:move.to.row,col:move.to.col};
    else newState.bk={row:move.to.row,col:move.to.col};
    // Castling rook move
    if(Math.abs(move.to.col-move.from.col)===2){
      if(move.to.col===6){newState.board[move.from.row][5]=newState.board[move.from.row][7];newState.board[move.from.row][7]=null;}
      if(move.to.col===2){newState.board[move.from.row][3]=newState.board[move.from.row][0];newState.board[move.from.row][0]=null;}
    }
  }
  if(piece.type==='pawn'){
    newState.halfMoveClock=0;
    if(Math.abs(move.to.row-move.from.row)===2){
      newState.enPassantTarget={row:(move.to.row+move.from.row)/2,col:move.from.col};
    }
  }
  if(captured)newState.halfMoveClock=0;
  if(piece.color==='black')newState.fullMoveNumber++;
  // Build notation if not provided
  if(!notation){
    notation=buildSAN(state,move,newState,captured);
  }
  return {notation,from:move.from,to:move.to,piece,captured,postState:newState};
}

function buildSAN(state,move,newState,captured){
  const piece=state.board[move.from.row][move.from.col];
  if(!piece)return move.to.col+''+move.to.row;
  let n='';
  if(piece.type==='king'&&Math.abs(move.to.col-move.from.col)===2){
    return move.to.col===6?'O-O':'O-O-O';
  }
  if(piece.type!=='pawn'){
    n+=piece.type==='knight'?'N':piece.type[0].toUpperCase();
  }
  if(captured){
    if(piece.type==='pawn')n+=String.fromCharCode(97+move.from.col);
    n+='x';
  }
  n+=String.fromCharCode(97+move.to.col)+(8-move.to.row);
  if(move.promotion)n+='='+move.promotion[0].toUpperCase();
  // v1.0.2 FIX: Add check/checkmate suffixes
  const opp=OPP_COLOR[piece.color];
  const oppKing=newState.board?null:null; // We need to check if opponent is in check
  // Check if opponent is in check after this move
  let isCheck=false;
  if(newState.wk||newState.bk){
    const oKing=opp==='white'?newState.wk:newState.bk;
    if(oKing){
      // Simple check detection: can any piece of the moving side attack the opp king?
      for(let r=0;r<8&&!isCheck;r++){
        for(let c=0;c<8&&!isCheck;c++){
          const p=newState.board[r][c];
          if(p&&p.color===piece.color){
            if(canMoveTo(newState,r,c,oKing.row,oKing.col)){
              isCheck=true;
            }
          }
        }
      }
    }
  }
  if(isCheck){
    // Check if it's checkmate (no legal moves for opponent)
    // Simplified: just add + for check, # for checkmate would require full legal move generation
    n+='+';
  }
  return n;
}

// Calculate material balance
function calcMaterial(board){
  let w=0,b=0;
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const p=board[r][c];
    if(p){const v=PIECE_VALUE[p.type];if(p.color==='white')w+=v;else b+=v;}
  }
  return w-b;
}

// v1.0.3: Generate FEN string from a game state.
//   Board placement (rank 8 → rank 1, '/'-separated), side to move,
//   castling rights, en passant target, halfmove clock, fullmove number.
//   Mirrors generateFEN() in chess.src/game-logic.js (GPL v3, DroidFish-derived).
//   NOTE: stats.html's state object is structurally compatible (see initState()
//   and executeMove above) — same field names as the main app.
function stateToFEN(state){
  if(!state||!state.board)return '';
  let fen='';
  // Board placement: rank 8 (row 0) first, down to rank 1 (row 7)
  for(let r=0;r<8;r++){
    let empty=0;
    for(let c=0;c<8;c++){
      const p=state.board[r][c];
      if(!p){empty++;continue;}
      if(empty>0){fen+=empty;empty=0;}
      const letter=p.type==='knight'?'n':p.type[0];
      fen+=p.color==='white'?letter.toUpperCase():letter.toLowerCase();
    }
    if(empty>0)fen+=empty;
    if(r<7)fen+='/';
  }
  // Side to move
  fen+=' '+(state.currentTurn==='white'?'w':'b');
  // Castling rights
  let cr='';
  if(state.castlingRights){
    if(state.castlingRights.whiteKingside)cr+='K';
    if(state.castlingRights.whiteQueenside)cr+='Q';
    if(state.castlingRights.blackKingside)cr+='k';
    if(state.castlingRights.blackQueenside)cr+='q';
  }
  fen+=' '+(cr||'-');
  // En passant target
  if(state.enPassantTarget){
    const sq=String.fromCharCode(97+state.enPassantTarget.col)+(8-state.enPassantTarget.row);
    fen+=' '+sq;
  }else{
    fen+=' -';
  }
  // Halfmove clock
  fen+=' '+(state.halfMoveClock!=null?state.halfMoveClock:0);
  // Fullmove number
  fen+=' '+(state.fullMoveNumber!=null?state.fullMoveNumber:1);
  return fen;
}

// v1.0.3: Extract per-move thinking times from PGN comments.
//   Recognizes TWO PGN time-comment conventions:
//
//   1. Direct "used time" format (v1.0.3 native):
//        {3.2s +0.5 略优}  — the "3.2s" is the actual seconds spent on the move.
//        Also recognizes the earlier em-dash variant {3.2s——...}.
//      No header is needed; each comment directly states the move's used time.
//
//   2. Clock-remaining format (standard PGN, requires [TimeControl] header):
//        [TimeControl "7200+60"]
//        1. d3 {[%clk 02:01:00]} 1... d6 {[%clk 02:00:58]}
//      The header "7200+60" means: each player starts with 7200 seconds of
//      base time, and gains 60 seconds of increment after each move.
//      Each [%clk HH:MM:SS] is the REMAINING clock AFTER the move.
//      To derive used time, we track each player's previous remaining clock
//      (initialized to baseTime) and compute:
//          used = (previousClock + increment) - currentClk
//      For move 1 (White): previousClock = baseTime (7200), increment = 60,
//        currentClk = 02:01:00 (7260s) → used = (7200 + 60) - 7260 = 0s
//        (White thought for <1s, so the +60 increment exactly offset to 7260).
//      For move 1...d6 (Black): previousClock = baseTime (7200), increment = 60,
//        currentClk = 02:00:58 (7258s) → used = (7200 + 60) - 7258 = 2s.
//
//   When [TimeControl] is present and a move has a [%clk] comment, the
//   increment-based calculation is used. When [TimeControl] is absent OR a
//   move has a direct {N.Ns} comment instead, the direct format wins for
//   that move.
//
//   Returns: {usedTimes: [num|null], clkTimes: [num|null], hasTimeControl: bool,
//             baseTime: num|null, increment: num|null}
//   - usedTimes[i] = seconds spent on move i (or null if unknown)
//   - clkTimes[i] = remaining clock after move i (or null)
//   - hasTimeControl = true if a [TimeControl "...+..."] header was found
//   - baseTime / increment = parsed from the header (null if absent)
//   - isBlackToMoveStart = true if the PGN starts with Black to move (detected
//     via FEN "... b ..." header or "1..." move-number prefix)
// v1.0.3: isBlackToMoveStart is detected inside the function (from FEN header
// or "1..." prefix) and used to correctly identify White/Black moves for the
// increment-based clock calculation. For Black-to-move games, move index 0
// is Black's move, so the parity is inverted.
function extractMoveTimes(pgnText){
  if(!pgnText)return {usedTimes:[],clkTimes:[],hasTimeControl:false,baseTime:null,increment:null,isBlackToMoveStart:false};
  let text=pgnText.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  // v1.0.3: Detect Black-to-move start for correct White/Black identification
  // in the increment-based clock calculation.
  let isBlackToMoveStart=false;
  const fenMatch=text.match(/\[FEN\s+"([^"]+)"\]/);
  if(fenMatch){
    const fenParts=fenMatch[1].split(/\s+/);
    if(fenParts.length>=2&&fenParts[1]==='b')isBlackToMoveStart=true;
  }
  if(!isBlackToMoveStart){
    // Check if movetext starts with "N..." (Black's move first)
    let mtCheck=text.replace(/^\[.*\]$/gm,'').trim();
    const firstNumMatch=mtCheck.match(/^(\d+\.+)/);
    if(firstNumMatch&&firstNumMatch[1].includes('...'))isBlackToMoveStart=true;
  }
  // --- Parse [TimeControl "BASE+INC"] header (or "BASE" with no increment) ---
  //   Examples: "7200+60", "1800", "300+5", "40/7200" (moves-per-time, treated as no increment here)
  let baseTime=null,increment=0,hasTimeControl=false;
  const tcMatch=text.match(/\[TimeControl\s+"([^"]+)"\]/);
  if(tcMatch){
    const tc=tcMatch[1].trim();
    // Standard format: "BASE+INC" where both are integers (seconds).
    // Some PGNs use "40/7200" (40 moves in 7200s) — we extract the base time
    // from after the slash and treat increment as 0.
    const incMatch=tc.match(/^(\d+)\+(\d+)$/);
    const noIncMatch=tc.match(/^(\d+)$/);
    const movesPerTimeMatch=tc.match(/^\d+\/(\d+)$/);
    if(incMatch){
      baseTime=parseInt(incMatch[1]);
      increment=parseInt(incMatch[2]);
      hasTimeControl=true;
    }else if(noIncMatch){
      baseTime=parseInt(noIncMatch[1]);
      increment=0;
      hasTimeControl=true;
    }else if(movesPerTimeMatch){
      baseTime=parseInt(movesPerTimeMatch[1]);
      increment=0;
      hasTimeControl=true;
    }
    // Other formats ("?", "SD/nn", "ourn") leave hasTimeControl=false
    // — we'll fall back to direct {Ns} parsing only.
  }
  // --- Walk the movetext (headers stripped) and collect per-move times ---
  // Remove header tags [...] (anything in square brackets at line start)
  // so they don't interfere with the movetext walk below.
  let moveText=text.replace(/^\[.*\]$/gm,'');
  const usedTimes=[];
  const clkTimes=[];
  let i=0;
  const sanRe=/^([KQRBN][a-h]?[1-8]?x?[a-h][1-8][+#]?=?[QRBN]?|O-O(?:-O)?|0-0(?:-0)?|[a-h]x?[a-h][1-8](?:=[QRBN])?[+#]?|[a-h][1-8][+#]?)/;
  const moveNumRe=/^(\d+\.+)/;
  const resultRe=/^(1-0|0-1|1\/2-1\/2|\*)\b/;
  // Track each player's PREVIOUS remaining clock, for increment-based used-time
  // calculation. Initialized to baseTime when the first [%clk] is seen.
  // (We lazy-init so that PGNs without [TimeControl] don't fabricate times.)
  let prevClkWhite=null,prevClkBlack=null;
  let clkInitialized=false;
  function initClkIfNeeded(){
    if(!clkInitialized&&hasTimeControl&&baseTime!=null){
      prevClkWhite=baseTime;
      prevClkBlack=baseTime;
      clkInitialized=true;
    }
  }
  while(i<moveText.length){
    const ch=moveText[i];
    if(/\s/.test(ch)){i++;continue;}
    // Comment block {...}
    if(ch==='{'){
      let end=moveText.indexOf('}',i);
      if(end<0)end=moveText.length-1;
      const comment=moveText.substring(i+1,end);
      // Direct used-time format: "<number>s" (e.g. "3.2s", "0.5s", "12s").
      // This is the v1.0.3 native format. We match the FIRST <number>s in the
      // comment — but NOT "D22" (no 's' suffix) or "0:05:30" (no 's' suffix).
      const timeMatch=comment.match(/(\d+(?:\.\d+)?)s/);
      // Clock-remaining format: [%clk HH:MM:SS]
      const clkMatch=comment.match(/\[%clk\s+([0-9]+):([0-9]+):([0-9]+\.?[0-9]*)\]/);
      // The comment belongs to the move that JUST HAPPENED — i.e., the
      // previous mainline move. So we attach it to usedTimes[len-1].
      // If no mainline move yet, attach to index 0 (initial position comment).
      const targetIdx=Math.max(0,usedTimes.length-1);
      // Determine which color made this move (for increment-based calc).
      // v1.0.3: For Black-to-move-start games, move index 0 is Black's,
      // so the parity is inverted.
      const isWhite=isBlackToMoveStart?(targetIdx%2===1):(targetIdx%2===0);
      if(clkMatch){
        const h=parseInt(clkMatch[1]),m=parseInt(clkMatch[2]),s=parseFloat(clkMatch[3]);
        const totalSec=h*3600+m*60+s;
        if(!isNaN(totalSec)){
          if(clkTimes[targetIdx]==null)clkTimes[targetIdx]=totalSec;
          // If we have a TimeControl header, derive used time via increment:
          //   used = (previousClock + increment) - currentClk
          // The "previousClock" is the player's clock BEFORE this move (i.e.,
          // their remaining time after their previous move, or baseTime for
          // their first move). After this move they gain `increment` seconds,
          // so the relationship is: currentClk = previousClock - used + increment
          // → used = previousClock + increment - currentClk.
          if(hasTimeControl&&baseTime!=null){
            initClkIfNeeded();
            const prevClk=isWhite?prevClkWhite:prevClkBlack;
            if(prevClk!=null){
              const used=prevClk+increment-totalSec;
              // Only set if the direct {Ns} format hasn't already filled this slot
              // (direct format takes precedence — it's more authoritative).
              if(usedTimes[targetIdx]==null){
                // Clamp to >= 0 (a negative used time would indicate data corruption
                // or a clock that went up — shouldn't happen in valid PGN).
                usedTimes[targetIdx]=Math.max(0,used);
              }
            }
            // Update the player's previous-clock for their NEXT move.
            if(isWhite)prevClkWhite=totalSec;else prevClkBlack=totalSec;
          }
        }
      }
      if(timeMatch){
        const sec=parseFloat(timeMatch[1]);
        if(!isNaN(sec)){
          // Direct format takes precedence over the increment-derived value.
          usedTimes[targetIdx]=sec;
        }
      }
      i=end+1;
      continue;
    }
    // Semicolon comment (rest of line)
    if(ch===';'){
      let end=moveText.indexOf('\n',i);
      if(end<0)end=moveText.length;
      i=end;
      continue;
    }
    // Variation block (...) — skip entirely for mainline time tracking.
    if(ch==='('){
      let depth=1,j=i+1;
      while(j<moveText.length&&depth>0){
        if(moveText[j]==='(')depth++;
        if(moveText[j]===')')depth--;
        j++;
      }
      i=j;
      continue;
    }
    // NAG ($1, $2, ...)
    if(ch==='$'){
      let j=i+1;
      while(j<moveText.length&&/\d/.test(moveText[j]))j++;
      i=j;
      continue;
    }
    // Move number (1. or 1...)
    const numM=moveText.substring(i).match(moveNumRe);
    if(numM){
      i+=numM[0].length;
      continue;
    }
    // Result marker
    const resM=moveText.substring(i).match(resultRe);
    if(resM){
      i+=resM[0].length;
      continue;
    }
    // SAN move — push a slot for it
    const sanM=moveText.substring(i).match(sanRe);
    if(sanM){
      // Push null initially; the comment that follows will fill it.
      usedTimes.push(null);
      clkTimes.push(null);
      i+=sanM[0].length;
      continue;
    }
    // Unknown character — skip
    i++;
  }
  return {usedTimes,clkTimes,hasTimeControl,baseTime,increment,isBlackToMoveStart};
}

// v1.0.3: Format seconds into a human-readable time string.
//   < 60s: "12.3s"
//   < 60min: "3m 25s"
//   >= 60min: "1h 12m 30s"
function formatTime(sec){
  if(sec==null||isNaN(sec))return '—';
  if(sec<60)return sec.toFixed(1)+T('time_sec_short');
  if(sec<3600){
    const m=Math.floor(sec/60);
    const s=Math.floor(sec%60);
    return m+'m '+s+'s';
  }
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=Math.floor(sec%60);
  return h+'h '+m+'m '+s+'s';
}

// Classify move based on eval delta
function classifyMove(evalDelta,isMoverWhite){
  const moverDelta=isMoverWhite?evalDelta:-evalDelta;
  if(moverDelta>200)return {cls:'brilliant',label:T('brilliant')};
  if(moverDelta>50)return {cls:'best',label:T('best')};
  if(moverDelta>-50)return {cls:'good',label:T('good')};
  if(moverDelta>-150)return {cls:'inaccuracy',label:T('inaccuracy')};
  if(moverDelta>-300)return {cls:'mistake',label:T('mistake')};
  return {cls:'blunder',label:T('blunder')};
}

// v1.0.3 FIX: Determine which color made the move at index i in the moves array.
//   For a standard White-to-move-start game: i%2===0 → White, i%2===1 → Black.
//   For a Black-to-move-start game (FEN "... b ..." or PGN starts with "1..."):
//   the first move (moves[0]) is Black's, so the parity is INVERTED:
//   i%2===0 → Black, i%2===1 → White.
//   `parsed` is the parsed object from parsePGN() (may be the effective parsed
//   object for a variation selection). `isBlackToMoveStart` is read from it;
//   if absent (old callers), defaults to false (White-to-move).
function moverIsWhite(i,parsed){
  const blackStart=parsed&&parsed.isBlackToMoveStart;
  return blackStart?(i%2===1):(i%2===0);
}
// v1.0.3 FIX: Build the move-number display string for move index i.
//   For White-to-move-start: move 1 = White (i=0 → "1."), move 1 = Black (i=1 → "1...")
//   For Black-to-move-start: move 1 = Black (i=0 → "1..."), move 1 = White (i=1 → "1.")
//   Returns "N." for White moves, "N..." for Black moves.
function moveNumDisplay(i,parsed){
  const moveNum=Math.floor(i/2)+1;
  return moverIsWhite(i,parsed)?(moveNum+'.'):(moveNum+'...');
}

// Calculate accuracy from CPL (Chess.com-style formula)
function calcAccuracy(avgCPL){
  if(avgCPL==null||isNaN(avgCPL))return null;
  const acc=103.1668*Math.exp(-0.04354*avgCPL);
  return Math.max(0,Math.min(100,acc)).toFixed(1);
}

// Render the PGN with rich formatting
function renderPGN(parsed,evalData){
  if(!parsed||!parsed.moves.length)return '<div class="loading">'+T('no_data')+'</div>';
  let h='<div class="pgn-display">';
  // Headers
  const defaultHeaders={Event:'?',Site:'?',Date:'?',Round:'?',White:'?',Black:'?',Result:'*',TimeControl:'?'};
  const hdrs={...defaultHeaders,...parsed.headers};
  for(const k of ['Event','Site','Date','Round','White','Black','Result','TimeControl']){
    h+='<span class="header-tag">['+k+' "'+(hdrs[k]||'?')+'"]</span>';
  }
  h+='<div style="margin-top:10px">';
  // Moves with comments and variations
  for(let i=0;i<parsed.moves.length;i++){
    const m=parsed.moves[i];
    const moveNum=Math.floor(i/2)+1;
    const isWhite=moverIsWhite(i,parsed);
    if(isWhite){
      h+='<span class="move-num">'+moveNum+'.</span> ';
    }
    // Render move with piece symbol
    h+='<span class="move">'+renderMoveNotation(m.notation)+'</span> ';
    // Eval annotation if available
    if(evalData&&evalData[i]){
      const ev=evalData[i];
      const evalStr=ev.mate?('#'+ev.mate):((ev.eval/100).toFixed(1));
      h+='<span class="comment">{'+evalStr+'}</span> ';
    }
  }
  h+='</div></div>';
  return h;
}

// Render move notation with piece symbols
function renderMoveNotation(notation){
  if(!notation)return '';
  // Replace piece letters with symbols
  let result=notation;
  // Detect color from context (alternating) — simplified: use white symbols for uppercase piece letters
  // Actually we need to know the color. For now, use a neutral approach: replace K/Q/R/B/N with symbols
  // The caller should wrap in appropriate color span
  return result;
}

// Render statistics
function renderStats(parsed,evalData){
  if(!parsed)return '';
  const moves=parsed.moves||[];
  let h='';

  // Metadata section
  h+='<div class="section"><h2>'+T('metadata')+'</h2><table>';
  const hdrs=parsed.headers||{};
  for(const k of ['Event','Site','Date','Round','White','Black','Result','TimeControl']){
    h+='<tr><th>'+k+'</th><td>'+(hdrs[k]||'?')+'</td></tr>';
  }
  h+='</table></div>';

  // Position statistics
  h+='<div class="section"><h2>'+T('position_stats')+'</h2><div class="stats-grid">';
  h+='<div class="stat-item"><div class="label">'+T('total_moves')+'</div><div class="value">'+moves.length+'</div></div>';
  // Final material — use last move's state, or initial state if no moves (FEN selected)
  if(moves.length>0){
    const finalMat=calcMaterial(moves[moves.length-1].state.board);
    h+='<div class="stat-item"><div class="label">'+T('material')+'</div><div class="value">'+(finalMat>0?'+':'')+finalMat+'</div></div>';
  }else if(parsed.initialState){
    // v1.0.3: FEN selected — show material from the initial position
    const initMat=calcMaterial(parsed.initialState.board);
    h+='<div class="stat-item"><div class="label">'+T('material')+'</div><div class="value">'+(initMat>0?'+':'')+initMat+'</div></div>';
  }
  h+='</div></div>';

  // Move quality
  if(evalData&&evalData.some(e=>e)){
    h+='<div class="section"><h2>'+T('move_quality')+'</h2>';
    let wCPL=[],bCPL=[];
    let classifications={brilliant:0,best:0,good:0,inaccuracy:0,mistake:0,blunder:0};
    for(let i=0;i<moves.length;i++){
      // v1.0.3 FIX: evalData[i] is the eval AFTER move i (reviewStep = i+1).
      // The eval BEFORE move i is evalData[i-1] (or the initial eval if i=0,
      // but we don't have that — so skip i=0 if no prior eval).
      // delta = evalData[i] - evalData[i-1] = change caused by move i.
      if(i===0){
        // No prior eval to compare — skip (can't compute CPL for first move)
        continue;
      }
      if(!evalData[i]||!evalData[i-1])continue;
      const prevEv=evalData[i-1].eval;
      const curEv=evalData[i].eval;
      const delta=curEv-prevEv;
      const isWhite=moverIsWhite(i,parsed);
      const cls=classifyMove(delta,isWhite);
      classifications[cls.cls]++;
      if(isWhite)wCPL.push(Math.max(0,-delta));
      else bCPL.push(Math.max(0,delta));
    }
    const avgW=wCPL.length?wCPL.reduce((a,b)=>a+b,0)/wCPL.length:0;
    const avgB=bCPL.length?bCPL.reduce((a,b)=>a+b,0)/bCPL.length:0;
    h+='<div class="stats-grid">';
    // v1.0.3 FIX: when there are no White/Black moves in the selection (e.g. a
    // variation selection that only has White moves), show "—" instead of a
    // misleading "100.0%". calcAccuracy(0) returns "100.0" which is wrong when
    // there are zero moves to average over.
    h+='<div class="stat-item"><div class="label">'+T('white_accuracy')+'</div><div class="value white">'+(wCPL.length?(calcAccuracy(avgW)+'%'):'—')+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+T('black_accuracy')+'</div><div class="value black">'+(bCPL.length?(calcAccuracy(avgB)+'%'):'—')+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+T('avg_cpl')+' W</div><div class="value">'+avgW.toFixed(0)+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+T('avg_cpl')+' B</div><div class="value">'+avgB.toFixed(0)+'</div></div>';
    h+='</div>';
    // Classification counts
    h+='<div style="margin-top:12px">';
    for(const cls of ['brilliant','best','good','inaccuracy','mistake','blunder']){
      h+='<span class="classification '+cls+'">'+T(cls)+': '+classifications[cls]+'</span> ';
    }
    h+='</div>';
    h+='</div>';
  }

  // Eval trend chart (SVG)
  if(evalData&&evalData.some(e=>e)){
    h+='<div class="section"><h2>'+T('eval_trend')+'</h2>';
    h+=renderEvalChart(evalData);
    h+='</div>';
  }

  // Material balance chart
  if(moves.length>0){
    h+='<div class="section"><h2>'+T('material_balance')+'</h2>';
    h+=renderMaterialChart(moves);
    h+='</div>';
  }

  // v1.0.2: Additional statistics based on the research report
  // Piece activity statistics
  if(moves.length>0){
    h+='<div class="section"><h2>'+(T('piece_activity')||'Piece Activity')+'</h2>';
    const pieceMoves={white:{pawn:0,knight:0,bishop:0,rook:0,queen:0,king:0},
                      black:{pawn:0,knight:0,bishop:0,rook:0,queen:0,king:0}};
    let captures={white:0,black:0};
    let checks=0,checkmates=0,castles={white:0,black:0},promotions=0;
    for(let i=0;i<moves.length;i++){
      const m=moves[i];
      if(m.piece&&pieceMoves[m.piece.color]){
        pieceMoves[m.piece.color][m.piece.type]++;
      }
      if(m.captured){
        if(moverIsWhite(i,parsed))captures.white++;else captures.black++;
      }
      if(m.notation&&m.notation.includes('+'))checks++;
      if(m.notation&&m.notation.includes('#'))checkmates++;
      if(m.notation&&(m.notation.includes('O-O')||m.notation.includes('0-0'))){
        if(moverIsWhite(i,parsed))castles.white++;else castles.black++;
      }
      if(m.notation&&m.notation.includes('='))promotions++;
    }
    h+='<div class="stats-grid">';
    h+='<div class="stat-item"><div class="label">'+(T('captures')||'Captures')+'</div><div class="value">'+(captures.white+captures.black)+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('checks')||'Checks')+'</div><div class="value">'+checks+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('castles')||'Castles')+'</div><div class="value">'+(castles.white+castles.black)+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('promotions')||'Promotions')+'</div><div class="value">'+promotions+'</div></div>';
    h+='</div>';
    // Piece movement table
    h+='<table style="margin-top:10px"><tr><th>'+(T('piece_type')||'Piece')+'</th><th>'+(T('white')||'White')+'</th><th>'+(T('black')||'Black')+'</th><th>'+(T('total')||'Total')+'</th></tr>';
    const pieceNames={pawn:(T('pawn')||'Pawn'),knight:(T('knight')||'Knight'),bishop:(T('bishop')||'Bishop'),rook:(T('rook')||'Rook'),queen:(T('queen')||'Queen'),king:(T('king')||'King')};
    for(const pt of ['pawn','knight','bishop','rook','queen','king']){
      const w=pieceMoves.white[pt],b=pieceMoves.black[pt];
      h+='<tr><td>'+pieceNames[pt]+'</td><td>'+w+'</td><td>'+b+'</td><td>'+(w+b)+'</td></tr>';
    }
    h+='</table>';
    h+='</div>';
  }

  // Phase analysis (opening/midgame/endgame)
  // v1.0.2 FIX: Use material-based phase detection instead of fixed percentages.
  // A game phase is determined by the number of non-pawn, non-king pieces on the board:
  //   Opening: >8 minor/major pieces total (both sides)
  //   Midgame: 4-8 pieces
  //   Endgame: <4 pieces
  // This is more accurate than percentage-based splitting and avoids showing
  // midgame/endgame for short games that haven't reached those phases.
  if(moves.length>0){
    h+='<div class="section"><h2>'+T('phase_analysis')+'</h2>';
    // Count phases by scanning each position
    let openingPly=0,midgamePly=0,endgamePly=0;
    for(let i=0;i<moves.length;i++){
      const board=moves[i].state.board;
      let nonPawnPieces=0;
      for(let r=0;r<8;r++)for(let c=0;c<8;c++){
        const p=board[r][c];
        if(p&&(p.type==='knight'||p.type==='bishop'||p.type==='rook'||p.type==='queen')){
          nonPawnPieces++;
        }
      }
      if(nonPawnPieces>8)openingPly++;
      else if(nonPawnPieces>=4)midgamePly++;
      else endgamePly++;
    }
    h+='<div class="stats-grid">';
    if(openingPly>0){
      h+='<div class="stat-item"><div class="label">'+T('opening')+'</div><div class="value">'+openingPly+' '+T('ply')+'</div></div>';
    }
    if(midgamePly>0){
      h+='<div class="stat-item"><div class="label">'+T('midgame')+'</div><div class="value">'+midgamePly+' '+T('ply')+'</div></div>';
    }
    if(endgamePly>0){
      h+='<div class="stat-item"><div class="label">'+T('endgame')+'</div><div class="value">'+endgamePly+' '+T('ply')+'</div></div>';
    }
    h+='</div>';
    // Final position material
    if(moves.length>0){
      const finalBoard=moves[moves.length-1].state.board;
      let wPieces=0,bPieces=0;
      for(let r=0;r<8;r++)for(let c=0;c<8;c++){
        const p=finalBoard[r][c];
        if(p){if(p.color==='white')wPieces++;else bPieces++;}
      }
      h+='<div class="stats-grid" style="margin-top:10px">';
      h+='<div class="stat-item"><div class="label">'+(T('final_material')||'Final Material')+'</div><div class="value">W:'+wPieces+' B:'+bPieces+'</div></div>';
      const finalMat=calcMaterial(finalBoard);
      h+='<div class="stat-item"><div class="label">'+(T('material_diff')||'Material Diff')+'</div><div class="value">'+(finalMat>0?'+':'')+finalMat+'</div></div>';
      h+='</div>';
    }
    h+='</div>';
  }

  // Key moments (biggest eval swings)
  if(evalData&&evalData.some(e=>e)){
    h+='<div class="section"><h2>'+(T('key_moments')||'Key Moments')+'</h2>';
    const swings=[];
    for(let i=1;i<evalData.length;i++){
      if(!evalData[i]||!evalData[i-1])continue;
      const prev=evalData[i-1].mate?(evalData[i-1].mate>0?90000:-90000):evalData[i-1].eval;
      const curr=evalData[i].mate?(evalData[i].mate>0?90000:-90000):evalData[i].eval;
      const delta=Math.abs(curr-prev);
      if(delta>=100){
        swings.push({move:i,delta:delta,prev:prev,curr:curr});
      }
    }
    swings.sort((a,b)=>b.delta-a.delta);
    if(swings.length>0){
      h+='<table><tr><th>#</th><th>'+(T('move')||'Move')+'</th><th>'+(T('eval_change')||'Eval Change')+'</th><th>'+(T('classification')||'Classification')+'</th></tr>';
      for(let i=0;i<Math.min(10,swings.length);i++){
        const s=swings[i];
        // v1.0.3 FIX: s.move is the evalData index where the swing was detected.
        // evalData[s.move] is the eval AFTER move (s.move) [0-indexed], and
        // evalData[s.move-1] is the eval BEFORE that move. So the move that
        // CAUSED the swing is at index s.move-1 in the moves array... wait:
        // evalData[0] = eval after move 0, evalData[1] = eval after move 1.
        // Swing between evalData[i-1] and evalData[i] is caused by move i-1? No!
        // evalData[i-1] is the eval after move (i-1). evalData[i] is the eval
        // after move i. So the swing is caused by move i (0-indexed).
        // s.move = i (the loop variable), so moveIdx = s.move.
        const moveIdx=s.move; // 0-based move index
        const moveNum=Math.floor(moveIdx/2)+1;
        const isWhite=moverIsWhite(moveIdx,parsed);
        const moverDelta=isWhite?s.curr-s.prev:s.prev-s.curr;
        const cls=classifyMove(s.curr-s.prev,isWhite);
        h+='<tr><td>'+(i+1)+'</td><td>'+moveNum+(isWhite?'.':'...')+'</td><td>'+(s.delta/100).toFixed(1)+' cp</td><td><span class="classification '+cls.cls+'">'+cls.label+'</span></td></tr>';
      }
      h+='</table>';
    }else{
      h+='<div class="loading">'+T('no_data')+'</div>';
    }
    h+='</div>';
  }

  // v1.0.3: Time management — comprehensive analysis using per-move thinking
  // times extracted from PGN comments. Supports two formats:
  //   1. Direct {1.0s ...} format (v1.0.3 native)
  //   2. [%clk HH:MM:SS] format with [TimeControl "BASE+INC"] header —
  //      used time is derived via increment calculation.
  // We extract times from the ORIGINAL PGN text (_payload.pgn) so that
  // imported PGNs with custom time annotations also work — not just the
  // current game's PGN built by the main app.
  // v1.0.3 FIX: When a variation or mainline move is selected, the time
  // management section must show times that correspond to the SAME move
  // sequence as the rest of the stats (effectiveParsed.moves). We slice
  // the times array to match the effective move count.
  if(_payload&&_payload.pgn){
    const tm=extractMoveTimes(_payload.pgn);
    let times=tm.usedTimes;
    // v1.0.3 FIX: Slice times to match the effective parsed moves length.
    // When a variation is selected, _variationMoves may have a different
    // length than the mainline. When a mainline move is selected, the
    // moves are sliced. We must align the times array to the same length
    // as effectiveParsed.moves to avoid showing times for moves that aren't
    // in the current selection.
    const effMoveCount=moves.length; // moves = effectiveParsed.moves
    if(times.length>effMoveCount){
      times=times.slice(0,effMoveCount);
    }
    const hasAnyTime=times.some(t=>t!=null);
    h+='<div class="section"><h2>'+T('time_management')+'</h2>';
    if(!hasAnyTime){
      h+='<div class="loading">'+T('time_no_data')+'</div>';
    }else{
      // v1.0.3: If a [TimeControl] header was found, show the time-control
      // info (base time + increment) at the top of the section.
      if(tm.hasTimeControl&&tm.baseTime!=null){
        h+='<div style="background:rgba(126,184,218,.08);border:1px solid rgba(126,184,218,.3);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:.82rem">';
        h+='<span style="color:var(--accent2);font-weight:600">'+T('time_control_header')+': </span>';
        h+='<span style="color:var(--text)">'+T('time_base_time')+' = <strong>'+formatTime(tm.baseTime)+'</strong>';
        if(tm.increment>0){
          h+='；'+T('time_increment')+' = <strong>+'+tm.increment+T('time_sec_short')+'</strong>';
        }else{
          h+='；'+T('time_increment')+' = <strong>'+T('time_no_increment')+'</strong>';
        }
        h+='</span></div>';
      }
      // Compute aggregates — only over moves that have a time.
      // White moves are at even indices, Black at odd indices.
      let total=0,whiteTotal=0,blackTotal=0;
      let whiteCount=0,blackCount=0;
      let maxT=-1,maxIdx=-1,minT=Number.MAX_SAFE_INTEGER,minIdx=-1;
      // Phase buckets — opening/midgame/endgame based on move count heuristics:
      //   Opening: first 20 plies (10 full moves)
      //   Midgame: plies 21-60 (moves 11-30)
      //   Endgame: ply 61+ (move 31+)
      let openT=0,midT=0,endT=0,openN=0,midN=0,endN=0;
      let longMoves=0,fastMoves=0;
      const allVals=[];
      for(let i=0;i<times.length;i++){
        const t=times[i];
        if(t==null)continue;
        total+=t;allVals.push(t);
        if(moverIsWhite(i,parsed)){whiteTotal+=t;whiteCount++;}
        else{blackTotal+=t;blackCount++;}
        if(t>maxT){maxT=t;maxIdx=i;}
        if(t<minT){minT=t;minIdx=i;}
        if(i<20){openT+=t;openN++;}
        else if(i<60){midT+=t;midN++;}
        else{endT+=t;endN++;}
        if(t>10)longMoves++;
        if(t<1)fastMoves++;
      }
      // Standard deviation (volatility)
      let stdDev=0;
      if(allVals.length>1){
        const mean=total/allVals.length;
        const variance=allVals.reduce((a,b)=>a+(b-mean)*(b-mean),0)/allVals.length;
        stdDev=Math.sqrt(variance);
      }
      // Summary stats grid
      const wAvg=whiteCount>0?whiteTotal/whiteCount:0;
      const bAvg=blackCount>0?blackTotal/blackCount:0;
      const overallAvg=allVals.length>0?total/allVals.length:0;
      h+='<div class="stats-grid">';
      h+='<div class="stat-item"><div class="label">'+T('time_total_used')+'</div><div class="value">'+formatTime(total)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_white_used')+'</div><div class="value white">'+formatTime(whiteTotal)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_black_used')+'</div><div class="value black">'+formatTime(blackTotal)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_avg_per_move')+'</div><div class="value">'+formatTime(overallAvg)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_white_avg')+'</div><div class="value white">'+formatTime(wAvg)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_black_avg')+'</div><div class="value black">'+formatTime(bAvg)+'</div></div>';
      h+='</div>';
      // Slowest / fastest move
      h+='<div class="stats-grid" style="margin-top:10px">';
      if(maxIdx>=0){
        const maxMoveNum=Math.floor(maxIdx/2)+1;
        const maxIsWhite=moverIsWhite(maxIdx,parsed);
        h+='<div class="stat-item"><div class="label">'+T('time_max_move')+'</div><div class="value">'+maxMoveNum+(maxIsWhite?'.':'...')+'<br><span style="font-size:.85rem">'+formatTime(maxT)+'</span></div></div>';
      }
      if(minIdx>=0){
        const minMoveNum=Math.floor(minIdx/2)+1;
        const minIsWhite=moverIsWhite(minIdx,parsed);
        h+='<div class="stat-item"><div class="label">'+T('time_min_move')+'</div><div class="value">'+minMoveNum+(minIsWhite?'.':'...')+'<br><span style="font-size:.85rem">'+formatTime(minT)+'</span></div></div>';
      }
      h+='<div class="stat-item"><div class="label">'+T('time_volatility')+'</div><div class="value">'+T('time_stddev')+': '+formatTime(stdDev)+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_long_moves')+'</div><div class="value">'+longMoves+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+T('time_fast_moves')+'</div><div class="value">'+fastMoves+'</div></div>';
      h+='</div>';
      // Phase distribution
      h+='<div style="margin-top:14px"><h3 style="font-size:.85rem;color:var(--accent);margin-bottom:6px">'+T('time_phase_dist')+'</h3>';
      h+='<div class="stats-grid">';
      if(openN>0){
        const pct=Math.round(openT/total*100);
        h+='<div class="stat-item"><div class="label">'+T('opening')+' ('+openN+' '+T('ply')+')</div><div class="value">'+formatTime(openT)+'<br><span style="font-size:.8rem">'+pct+T('time_pct')+'</span></div></div>';
      }
      if(midN>0){
        const pct=Math.round(midT/total*100);
        h+='<div class="stat-item"><div class="label">'+T('midgame')+' ('+midN+' '+T('ply')+')</div><div class="value">'+formatTime(midT)+'<br><span style="font-size:.8rem">'+pct+T('time_pct')+'</span></div></div>';
      }
      if(endN>0){
        const pct=Math.round(endT/total*100);
        h+='<div class="stat-item"><div class="label">'+T('endgame')+' ('+endN+' '+T('ply')+')</div><div class="value">'+formatTime(endT)+'<br><span style="font-size:.8rem">'+pct+T('time_pct')+'</span></div></div>';
      }
      h+='</div></div>';
      // Per-move time bar chart
      h+='<div style="margin-top:14px"><h3 style="font-size:.85rem;color:var(--accent);margin-bottom:6px">'+T('time_chart_title')+'</h3>';
      h+=renderTimeChart(times,parsed);
      h+='</div>';
      // Format hint — choose the appropriate one based on which format was used
      const hint=tm.hasTimeControl?T('time_format_hint_clk'):T('time_format_hint');
      h+='<p style="color:var(--muted);font-size:.78rem;margin-top:10px">'+hint+'</p>';
    }
    h+='</div>';
  }

  // v1.0.2: Advanced statistics — extract hidden information from PGN
  // Opening repertoire analysis
  if(moves.length>=2){
    h+='<div class="section"><h2>'+(T('opening_repertoire')||'Opening Repertoire')+'</h2>';
    // Determine opening phase (first 8 plies)
    const openingPlies=Math.min(8,moves.length);
    let firstMoves='';
    for(let i=0;i<openingPlies;i++){
      const m=moves[i];
      const moveNum=Math.floor(i/2)+1;
      if(moverIsWhite(i,parsed))firstMoves+=moveNum+'. ';
      firstMoves+=m.notation+' ';
    }
    h+='<p style="font-size:.85rem;color:var(--text);margin-bottom:8px">'+firstMoves.trim()+'</p>';
    // Piece development speed
    let wDev=0,bDev=0;
    for(let i=0;i<moves.length;i++){
      const m=moves[i];
      if(m.piece&&(m.piece.type==='knight'||m.piece.type==='bishop')){
        if(m.piece.color==='white')wDev++;
        else bDev++;
      }
      if(i>=15)break; // Only count opening phase
    }
    h+='<div class="stats-grid">';
    h+='<div class="stat-item"><div class="label">'+(T('white_development')||'W Development')+'</div><div class="value white">'+wDev+' '+(T('minor_moves')||'minor')+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('black_development')||'B Development')+'</div><div class="value black">'+bDev+' '+(T('minor_moves')||'minor')+'</div></div>';
    h+='</div>';
    h+='</div>';
  }

  // Pawn structure analysis
  if(moves.length>0){
    h+='<div class="section"><h2>'+(T('pawn_structure')||'Pawn Structure')+'</h2>';
    const finalBoard=moves[moves.length-1].state.board;
    // Count pawn structure features
    let wDoubled=0,bDoubled=0,wIsolated=0,bIsolated=0,wPassed=0,bPassed=0;
    const wPawns=[],bPawns=[];
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const p=finalBoard[r][c];
      if(p&&p.type==='pawn'){
        if(p.color==='white')wPawns.push({r,c});else bPawns.push({r,c});
      }
    }
    // Doubled pawns: same file, same color
    for(let c=0;c<8;c++){
      const wInFile=wPawns.filter(p=>p.c===c);
      const bInFile=bPawns.filter(p=>p.c===c);
      if(wInFile.length>1)wDoubled+=wInFile.length-1;
      if(bInFile.length>1)bDoubled+=bInFile.length-1;
    }
    // Isolated pawns: no friendly pawns on adjacent files
    for(const p of wPawns){
      const hasAdjacent=wPawns.some(p2=>p2.c!==p.c&&Math.abs(p2.c-p.c)===1);
      if(!hasAdjacent)wIsolated++;
    }
    for(const p of bPawns){
      const hasAdjacent=bPawns.some(p2=>p2.c!==p.c&&Math.abs(p2.c-p.c)===1);
      if(!hasAdjacent)bIsolated++;
    }
    // Passed pawns: no enemy pawns ahead on same or adjacent files
    for(const p of wPawns){
      const isPassed=!bPawns.some(bp=>bp.c>=p.c-1&&bp.c<=p.c+1&&bp.r<p.r);
      if(isPassed)wPassed++;
    }
    for(const p of bPawns){
      const isPassed=!wPawns.some(wp=>wp.c>=p.c-1&&wp.c<=p.c+1&&wp.r>p.r);
      if(isPassed)bPassed++;
    }
    h+='<div class="stats-grid">';
    h+='<div class="stat-item"><div class="label">'+(T('doubled')||'Doubled')+'</div><div class="value">W:'+wDoubled+' B:'+bDoubled+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('isolated')||'Isolated')+'</div><div class="value">W:'+wIsolated+' B:'+bIsolated+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('passed')||'Passed')+'</div><div class="value">W:'+wPassed+' B:'+bPassed+'</div></div>';
    h+='</div>';
    h+='</div>';
  }

  // Center control analysis
  if(moves.length>0){
    h+='<div class="section"><h2>'+(T('center_control')||'Center Control')+'</h2>';
    // Count how many moves targeted center squares (d4, e4, d5, e5)
    let wCenter=0,bCenter=0;
    for(let i=0;i<moves.length;i++){
      const m=moves[i];
      if(m.to){
        // m.to is {row, col} — center squares: d4(4,3), e4(4,4), d5(3,3), e5(3,4)
        const r=m.to.row,c=m.to.col;
        if((r===4&&c===3)||(r===4&&c===4)||(r===3&&c===3)||(r===3&&c===4)){
          if(moverIsWhite(i,parsed))wCenter++;else bCenter++;
        }
      }
    }
    h+='<div class="stats-grid">';
    h+='<div class="stat-item"><div class="label">'+(T('white_center')||'W Center Moves')+'</div><div class="value white">'+wCenter+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('black_center')||'B Center Moves')+'</div><div class="value black">'+bCenter+'</div></div>';
    h+='</div>';
    h+='</div>';
  }

  // King safety analysis
  if(moves.length>0){
    h+='<div class="section"><h2>'+(T('king_safety')||'King Safety')+'</h2>';
    // Count checks delivered and king moves
    let wChecks=0,bChecks=0,wKingMoves=0,bKingMoves=0;
    for(let i=0;i<moves.length;i++){
      const m=moves[i];
      if(m.notation&&m.notation.includes('+')){
        if(moverIsWhite(i,parsed))wChecks++;else bChecks++;
      }
      if(m.piece&&m.piece.type==='king'){
        if(moverIsWhite(i,parsed))wKingMoves++;else bKingMoves++;
      }
    }
    h+='<div class="stats-grid">';
    h+='<div class="stat-item"><div class="label">'+(T('checks_given')||'Checks Given')+'</div><div class="value">W:'+wChecks+' B:'+bChecks+'</div></div>';
    h+='<div class="stat-item"><div class="label">'+(T('king_moves')||'King Moves')+'</div><div class="value">W:'+wKingMoves+' B:'+bKingMoves+'</div></div>';
    h+='</div>';
    h+='</div>';
  }

  // Game complexity (eval volatility)
  if(evalData&&evalData.some(e=>e)){
    h+='<div class="section"><h2>'+(T('game_complexity')||'Game Complexity')+'</h2>';
    const validEvals=evalData.filter(e=>e).map(e=>e.mate?(e.mate>0?90000:-90000):e.eval);
    if(validEvals.length>=3){
      // Volatility: standard deviation of eval changes
      const changes=[];
      for(let i=1;i<validEvals.length;i++){
        changes.push(Math.abs(validEvals[i]-validEvals[i-1]));
      }
      const avgChange=changes.reduce((a,b)=>a+b,0)/changes.length;
      const variance=changes.reduce((a,b)=>a+(b-avgChange)*(b-avgChange),0)/changes.length;
      const stdDev=Math.sqrt(variance);
      // Lead swings: number of times the eval crosses zero
      let swings=0;
      for(let i=1;i<validEvals.length;i++){
        if((validEvals[i-1]>50&&validEvals[i]<-50)||(validEvals[i-1]<-50&&validEvals[i]>50))swings++;
      }
      // Advantage duration: how many plies one side was ahead
      let wAhead=0,bAhead=0;
      for(const e of validEvals){
        if(e>50)wAhead++;else if(e<-50)bAhead++;
      }
      h+='<div class="stats-grid">';
      h+='<div class="stat-item"><div class="label">'+(T('volatility')||'Volatility')+'</div><div class="value">'+stdDev.toFixed(0)+' cp</div></div>';
      h+='<div class="stat-item"><div class="label">'+(T('lead_swings')||'Lead Swings')+'</div><div class="value">'+swings+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+(T('white_advantage')||'W Advantage Ply')+'</div><div class="value white">'+wAhead+'</div></div>';
      h+='<div class="stat-item"><div class="label">'+(T('black_advantage')||'B Advantage Ply')+'</div><div class="value black">'+bAhead+'</div></div>';
      h+='</div>';
    }
    h+='</div>';
  }

  return h;
}

function renderEvalChart(evalData){
  const w=600,h=120,pad=20;
  const validEvals=evalData.filter(e=>e).map(e=>e.mate?(e.mate>0?90000:-90000):e.eval);
  if(validEvals.length<2)return '<div class="loading">'+T('no_data')+'</div>';
  const maxEv=Math.max(...validEvals,500);
  const minEv=Math.min(...validEvals,-500);
  const range=maxEv-minEv||1;
  let points='';
  for(let i=0;i<validEvals.length;i++){
    const x=pad+(i/(validEvals.length-1))*(w-2*pad);
    const y=h-pad-((validEvals[i]-minEv)/range)*(h-2*pad);
    points+=x+','+y+' ';
  }
  // Zero line
  const zeroY=h-pad-((0-minEv)/range)*(h-2*pad);
  let svg='<svg class="eval-chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">';
  svg+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="rgba(0,0,0,.3)"/>';
  // Zero line (green if visible)
  if(zeroY>0&&zeroY<h){
    svg+='<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(w-pad)+'" y2="'+zeroY+'" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>';
  }
  // Eval line
  svg+='<polyline points="'+points+'" fill="none" stroke="#d4a017" stroke-width="2"/>';
  svg+='</svg>';
  return svg;
}

function renderMaterialChart(moves){
  const w=600,h=80,pad=15;
  const materials=moves.map(m=>calcMaterial(m.state.board));
  if(materials.length<2)return '<div class="loading">'+T('no_data')+'</div>';
  const maxMat=Math.max(...materials,3);
  const minMat=Math.min(...materials,-3);
  const range=maxMat-minMat||1;
  let points='';
  for(let i=0;i<materials.length;i++){
    const x=pad+(i/(materials.length-1))*(w-2*pad);
    const y=h-pad-((materials[i]-minMat)/range)*(h-2*pad);
    points+=x+','+y+' ';
  }
  const zeroY=h-pad-((0-minMat)/range)*(h-2*pad);
  let svg='<svg class="material-chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">';
  svg+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="rgba(0,0,0,.3)"/>';
  if(zeroY>0&&zeroY<h){
    svg+='<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(w-pad)+'" y2="'+zeroY+'" stroke="#444" stroke-width="1" stroke-dasharray="2,2"/>';
  }
  svg+='<polyline points="'+points+'" fill="none" stroke="#7eb8da" stroke-width="2"/>';
  svg+='</svg>';
  return svg;
}

// v1.0.3: Render per-move thinking-time bar chart.
//   times: array of seconds-per-move (null entries are skipped — bar shows gap).
//   White moves get white bars, Black moves get blue bars.
//   The y-axis auto-scales to the maximum time. The x-axis is move index (0-based).
//   Hovering a bar shows the move number and time (via <title> element).
//   `parsed` is passed to determine White/Black via moverIsWhite (handles
//   Black-to-move-start games where the parity is inverted).
function renderTimeChart(times,parsed){
  const w=600,h=120,pad=20;
  if(!times||times.length===0)return '<div class="loading">'+T('no_data')+'</div>';
  const valid=times.filter(t=>t!=null);
  if(valid.length===0)return '<div class="loading">'+T('no_data')+'</div>';
  const maxT=Math.max(...valid,1);
  const n=times.length;
  const barW=Math.max(2,(w-2*pad)/n);
  let svg='<svg class="time-chart" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">';
  svg+='<rect x="0" y="0" width="'+w+'" height="'+h+'" fill="rgba(0,0,0,.3)"/>';
  // Zero line (bottom)
  svg+='<line x1="'+pad+'" y1="'+(h-pad)+'" x2="'+(w-pad)+'" y2="'+(h-pad)+'" stroke="#444" stroke-width="1"/>';
  // Bars
  for(let i=0;i<n;i++){
    const t=times[i];
    if(t==null)continue;
    const x=pad+i*barW;
    const barH=Math.max(1,(t/maxT)*(h-2*pad));
    const y=h-pad-barH;
    const isWhite=moverIsWhite(i,parsed);
    const cls=isWhite?'white':'black';
    const moveNum=Math.floor(i/2)+1;
    const side=isWhite?'.':'...';
    svg+='<rect class="time-chart-bar '+cls+'" x="'+x+'" y="'+y+'" width="'+(barW*0.85)+'" height="'+barH+'" rx="1"><title>'+moveNum+side+' '+formatTime(t)+'</title></rect>';
  }
  svg+='</svg>';
  return svg;
}

// v1.0.3: Render the FEN panel — below the PGN text panel.
//   Shows the FEN of the position after the currently selected move.
//   If no move is selected, shows the initial position FEN + a hint.
//   If a variation move is selected, shows the FEN after that variation move
//   (computed from the synthetic _variationMoves array).
function renderFENPanel(effectiveParsed,selectedIdx){
  let fen='';
  let hint='';
  if(selectedIdx>=0&&effectiveParsed.moves&&effectiveParsed.moves[selectedIdx]){
    fen=stateToFEN(effectiveParsed.moves[selectedIdx].state);
  }else if(effectiveParsed.startFEN){
    fen=effectiveParsed.startFEN;
    hint=T('fen_hint');
  }else{
    fen='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
    hint=T('fen_hint');
  }
  let h='<div class="fen-panel">';
  h+='<span class="fen-label">'+T('fen_label')+(hint?' <span style="font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0">'+hint+'</span>':'')+'</span>';
  h+='<span class="fen-value" id="fenValue">'+_escFEN(fen)+'</span>';
  // v1.0.3: copy button in its own row at the bottom-right, so it never overlaps the FEN text
  h+='<div class="fen-copy-row"><button class="fen-copy" onclick="copyFENToClipboard()">'+T('fen_copy')+'</button></div>';
  h+='</div>';
  return h;
}
// v1.0.3: escape FEN for safe HTML display (FEN contains only [a-zA-Z0-9 /-], but
// defensive escaping never hurts).
function _escFEN(s){
  if(!s)return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// v1.0.3: Copy FEN to clipboard. Uses navigator.clipboard if available,
// falls back to a hidden textarea + document.execCommand('copy').
// Shows a toast via the standard _haptic + a temporary banner.
function copyFENToClipboard(){
  _haptic('BUTTON_PRESS');
  const el=document.getElementById('fenValue');
  if(!el)return;
  const text=el.textContent||'';
  if(!text)return;
  function showMsg(ok){
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:'+(ok?'rgba(39,174,96,.95)':'rgba(192,57,43,.95)')+';color:#fff;padding:8px 16px;border-radius:6px;font-size:.8rem;z-index:10001;box-shadow:0 2px 8px rgba(0,0,0,.4)';
    banner.textContent=ok?T('fen_copied'):T('fen_copy_failed');
    document.body.appendChild(banner);
    setTimeout(()=>{if(banner.parentNode)banner.parentNode.removeChild(banner);},1500);
  }
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(()=>showMsg(true)).catch(()=>fallbackCopy(text,showMsg));
    }else{
      fallbackCopy(text,showMsg);
    }
  }catch(e){fallbackCopy(text,showMsg);}
}
function fallbackCopy(text,cb){
  try{
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.style.cssText='position:fixed;left:-9999px;top:0';
    document.body.appendChild(ta);
    ta.select();
    const ok=document.execCommand('copy');
    document.body.removeChild(ta);
    cb(ok);
  }catch(e){cb(false);}
}

// PGN text section (raw with formatting)
function renderPGNText(parsed,evalData,comments){
  if(!parsed)return '<div class="loading">'+T('no_data')+'</div>';
  // v1.0.2: Display the COMPLETE PGN text from the original payload, preserving
  // ALL comments ({} blocks), variations (()), NAGs ($1), and move numbers.
  // Replace piece letters with symbols (♔♚♕♛♖♜♗♝♘♞) and prepend ♙/♟ for pawn moves.
  // Comments are displayed as-is (原文) with dark-blue italic styling.
  let h='<div class="section"><h2>'+T('pgn_text')+'</h2><div class="pgn-display">';
  h+='<div style="margin-top:0;white-space:pre-wrap;word-break:break-word">';
  let rawPGN=_payload.pgn||'';
  // v1.0.3: Extract [FEN "..."] header for display BEFORE moves.
  // The FEN is shown in a smaller font, selectable (clicking shows stats
  // for the initial position with 0 moves), followed by a blank line.
  const fenMatch=rawPGN.match(/\[FEN\s+"([^"]+)"\]/);
  if(fenMatch){
    const fenText=fenMatch[1].trim();
    // v1.0.3: Check if FEN is explicitly selected via _fenSelected toggle.
    // When _fenSelected is true, the FEN is highlighted as selected.
    // When a move or variation is selected, _fenSelected is false.
    const isFenSelected=_fenSelected;
    h+='<span class="fen-inline'+(isFenSelected?' selected':'')+'" onclick="selectInitialPosition()" style="font-size:.75rem;color:'+(isFenSelected?'#fff':'var(--accent2)')+';font-family:\'Sarasa Mono SC\',\'Noto Sans Mono\',monospace;cursor:pointer;padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:4px;border:1px solid '+(isFenSelected?'var(--accent2)':'rgba(126,184,218,.3)')+';background:'+(isFenSelected?'rgba(126,184,218,.3)':'rgba(126,184,218,.1)')+'">'+_escFEN(fenText)+'</span>';
    h+='<div style="height:8px"></div>'; // blank line separator
  }
  // Remove header tags [...] (already shown in metadata section + FEN above)
  let movetext=rawPGN.replace(/\[[^\]]*\]\s*/g,'').trim();
  // Piece symbol mapping: uppercase = White, lowercase = Black
  const pieceSym={K:'♔\uFE0E',Q:'♕\uFE0E',R:'♖\uFE0E',B:'♗\uFE0E',N:'♘\uFE0E'};
  // Track whose turn it is to determine pawn symbol color
  // In PGN, White moves first (move 1.), then Black, alternating.
  // We track the side by counting moves: odd move count = White, even = Black.
  // But variations and comments make this tricky. We use a simpler approach:
  // After a "N." (White move number), the next move is White's.
  // After a "N..." (Black move number), the next move is Black's.
  // If no move number prefix, alternate based on the last known side.
  let nextSide='white'; // default: first move is White's
  let result='';
  let i=0;
  let _moveIdx=0; // v1.0.2: track move index for click selection
  // v1.0.2 FIX: renderSAN now returns HTML with the piece symbol wrapped in its
  // own <span class="piece-white/piece-black"> so the symbol gets the correct
  // color/stroke/glow (matching the main board), while the rest of the move
  // notation (destination square, capture marker, check/mate suffix, promotion)
  // stays in the default move text color. This matches how the main board
  // separates piece symbol from square label.
  const blackSym={K:'♚\uFE0E',Q:'♛\uFE0E',R:'♜\uFE0E',B:'♝\uFE0E',N:'♞\uFE0E'};
  function renderSAN(move,side){
    const pieceClass=side==='white'?'piece-white':'piece-black';
    const isCastling=move.startsWith('O-O')||move.startsWith('0-0');
    if(isCastling){
      // v1.0.2: Castling display: short = ♔-♖, long = ♔-O-♖
      // Both king and rook symbols get the piece-color styling.
      const wk=side==='white'?'♔\uFE0E':'♚\uFE0E';
      const wr=side==='white'?'♖\uFE0E':'♜\uFE0E';
      // Long castling (O-O-O or 0-0-0)
      if(move.startsWith('O-O-O')||move.startsWith('0-0-0')){
        return '<span class="'+pieceClass+'">'+wk+'</span>-O-<span class="'+pieceClass+'">'+wr+'</span>';
      }
      // Short castling (O-O or 0-0)
      return '<span class="'+pieceClass+'">'+wk+'</span>-<span class="'+pieceClass+'">'+wr+'</span>';
    }
    const isFirstPiece='KQRBN'.includes(move[0]||'');
    if(!isFirstPiece){
      // Pawn move — prepend ♙ (White) or ♟ (Black), wrapped in piece-color span.
      // The rest of the move (e.g. "e4", "exd5", "e8=Q+") stays in default color.
      const pawnSym=side==='white'?'♙\uFE0E':'♟\uFE0E';
      return '<span class="'+pieceClass+'">'+pawnSym+'</span>'+move;
    }else{
      // Replace the first piece letter with the correct-colored symbol (wrapped),
      // keep the rest of the move in default color.
      const letter=move[0];
      const sym2=side==='white'?pieceSym[letter]:blackSym[letter];
      return '<span class="'+pieceClass+'">'+sym2+'</span>'+move.substring(1);
    }
  }
  while(i<movetext.length){
    // Comment block {...} — display as-is (原文)
    if(movetext[i]==='{'){
      let end=movetext.indexOf('}',i);
      if(end<0)end=movetext.length-1;
      const comment=movetext.substring(i+1,end);
      result+='<span class="comment">{'+comment+'}</span>';
      i=end+1;
      continue;
    }
    // Variation block (...) — recursively render with side tracking.
    // v1.0.3: Variation moves are now CLICKABLE. Each variation is registered
    //   in the _variations[] array with metadata needed to reconstruct the
    //   synthetic move sequence on click:
    //     - mainIdxBefore: index of the mainline move that the variation's
    //       first move REPLACES (i.e., the move immediately to the LEFT of `(`).
    //       This is `_moveIdx - 1` if any mainline move has been rendered, else 0.
    //     - moves: array of SAN strings inside the variation (cleaned of
    //       move-number prefixes, NAGs, comments).
    //     - sideAtStart: whose turn at the start of the variation.
